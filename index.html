<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Tracking Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .input-mewah { border: 2px solid #F3F4F6; transition: all 0.3s; }
        .input-mewah:focus { border-color: #10B981; outline: none; }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F9FAFB] pb-32">

    <nav class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white shadow-lg">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter">GRAB<span class="text-green-600 italic">NDESO</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-extrabold text-green-600 border-2 border-green-600 px-4 py-2 rounded-full uppercase tracking-tighter">Lacak Pesanan</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5">
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="bg-white h-52 rounded-[2rem] animate-pulse"></div>
            <div class="bg-white h-52 rounded-[2rem] animate-pulse"></div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] p-8 animasi-up text-left">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-extrabold text-gray-800 mb-2 text-center text-left">Data Antar</h3>
            <div class="space-y-4">
                <input type="text" id="f-nama" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Nama Lengkap">
                <input type="number" id="f-wa" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="WhatsApp">
                <textarea id="f-alamat" rows="2" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                <div class="bg-green-50 p-4 rounded-2xl flex justify-between border border-green-100">
                    <span class="text-xs font-bold text-green-600">ONGKIR FLAT</span>
                    <span class="font-black text-green-600">Rp 5.000</span>
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="tutupModal()" class="flex-1 py-4 text-gray-400 font-bold">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl">GAS PESAN!</button>
            </div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 hidden z-50">
        <div class="bg-[#1A1A1A] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-xl">🛒</div>
                <p id="total-harga-bar" class="font-extrabold text-lg leading-none">Rp 0</p>
            </div>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-tighter">Checkout</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];

        async function loadMenu() {
            const container = document.getElementById('daftar-menu');
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2.5rem] p-3 shadow-sm border border-gray-50 flex flex-col">
                            <img src="${item.foto_url || 'https://via.placeholder.com'}" class="w-full h-32 object-cover rounded-[2rem] mb-3">
                            <div class="px-2">
                                <h3 class="font-bold text-[11px] text-gray-800 leading-tight mb-1">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-black text-xs">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button onclick="masukKeranjang('${item.nama_makanan}', ${item.harga})" 
                                class="w-full mt-3 bg-gray-50 text-green-600 py-2 rounded-xl text-[9px] font-black uppercase">
                                + Tambah
                            </button>
                        </div>`;
                });
            }
        }

        function masukKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            document.getElementById('cart-bar').classList.remove('hidden');
            const total = keranjang.reduce((s, i) => s + i.harga, 0);
            document.getElementById('total-harga-bar').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function kirimOrderan() {
            const nama = document.getElementById('f-nama').value;
            const alamat = document.getElementById('f-alamat').value;
            if (!nama || !alamat) return alert("Isi nama & alamat dulu!");

            const { data } = await sb.from('pesanan_ojek').insert([{ 
                nama_pembeli: nama, alamat_kirim: alamat, status: 'pending' 
            }]).select();

            if (data) {
                tutupModal();
                tampilkanHalamanTracking(data[0].id, 'pending');
                keranjang = []; 
            }
        }

        function tampilkanHalamanTracking(id, statusAwal) {
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-8 bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-gray-50">
                    <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl">🥘</div>
                    <h3 id="txt-status" class="text-3xl font-black text-gray-800 uppercase italic tracking-tighter">${statusAwal}</h3>
                    
                    <div class="relative h-2 bg-gray-100 rounded-full mb-16 mt-16 mx-4">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                        <div id="motor" class="absolute -top-12 text-5xl transition-all duration-700" style="left:0%">🛵</div>
                    </div>

                    <p id="txt-desc" class="text-xs text-gray-400 font-bold mb-10 px-4">Sabar ya lur, driver lagi gas pol menuju rumahmu!</p>

                    <button onclick="window.location.reload()" class="bg-gray-100 text-gray-500 w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition">Kembali ke Menu</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);

            sb.channel('track-' + id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, (p) => { geserMotor(p.new.status); }).subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            if (!m) return;
            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; m.innerHTML = "🛵"; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; m.innerHTML = "👨‍🍳"; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; }
        }

        function tanyaStatus() {
            const n = prompt("Cek Nama Pesanan:");
            if (n) {
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => {
                    if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status);
                    else alert("Gak ada pesanan nama itu!");
                });
            }
        }
        loadMenu();
    </script>
</body>
</html>
