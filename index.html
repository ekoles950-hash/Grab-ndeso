<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Chat System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #F9FAFB; }
        /* MODAL CHAT PERSIS BASECAMP */
        #chatWidget { 
            display: none; position: fixed; bottom: 90px; left: 15px; right: 15px; 
            max-width: 360px; background: #1E293B; border-radius: 2rem; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); 
            z-index: 1000; border: 1px solid #334155; 
        }
        .chat-header { background: #10B981; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 320px; overflow-y: auto; padding: 20px; background: #0F172A; display: flex; flex-direction: column; gap: 10px; }
        .bubble-admin { background: #334155; color: white; padding: 10px 15px; border-radius: 15px 15px 15px 5px; font-size: 12px; max-width: 80%; align-self: flex-start; }
        .bubble-user { background: #10B981; color: white; padding: 10px 15px; border-radius: 15px 15px 5px 15px; font-size: 12px; max-width: 80%; align-self: flex-end; }
        .nav-bawah { position: fixed; bottom: 0; left: 0; right: 0; bg-white; border-t: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px; background: white; border-radius: 2rem 2rem 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <nav class="p-4 flex justify-center bg-white border-b border-gray-100">
        <h1 class="text-xl font-black italic">GRAB<span class="text-green-600">NDESO</span></h1>
    </nav>

    <div id="chatWidget">
        <div class="chat-header text-white">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle-user text-2xl"></i>
                <div>
                    <p class="font-bold text-xs">Live Chat GrabNdeso</p>
                    <p id="ref-teks" class="text-[9px] opacity-80">Ref: -</p>
                </div>
            </div>
            <button onclick="toggleChat()" class="font-bold">✕</button>
        </div>
        <div id="boxChat" class="chat-body">
            <div class="bubble-admin">Halo! Ada yang bisa kami bantu Bos?</div>
        </div>
        <div class="p-3 bg-[#1E293B] flex gap-2">
            <input type="text" id="chatInp" class="flex-1 bg-[#0F172A] text-white text-xs p-3 rounded-xl border border-gray-700 outline-none" placeholder="Ketik pesene sampeyan...">
            <button onclick="kirimChat()" class="bg-green-500 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="nav-bawah max-w-md mx-auto">
        <button class="flex flex-col items-center gap-1 opacity-40"><i class="fa-solid fa-search"></i><span class="text-[9px] font-bold">LACAK</span></button>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1"><i class="fa-solid fa-house text-green-600"></i><span class="text-[9px] font-bold text-green-600">BERANDA</span></button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1"><i class="fa-solid fa-message"></i><span class="text-[9px] font-bold">CHAT</span></button>
    </div>

    <script>
        // PAKAI KONFIGURASI SUPABASE BOS
        const SB_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SB_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const TOKEN = "8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM";
        const CID = "7933777456";

        // Ambil ID Unik (Ref ID)
        let myID = localStorage.getItem('chatSessionId');
        if (!myID) {
            myID = "GN-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            localStorage.setItem('chatSessionId', myID);
        }

        function toggleChat() {
            let w = document.getElementById('chatWidget');
            document.getElementById('ref-teks').innerText = "Ref: " + myID;
            if(w.style.display === 'block') {
                w.style.display = 'none';
            } else {
                w.style.display = 'block';
                loadChat();
                hubungkanRealtime();
            }
        }

        async function kirimChat() {
            let inp = document.getElementById('chatInp');
            let teks = inp.value.trim();
            if(!teks) return;

            // 1. Simpan ke Supabase (Sesuaikan nama kolom)
            // Di Basecamp Bos pakai kolom 'pesanan_id' atau 'pesanan_id_string'?
            // Saya pakai 'pesanan_id_string' sesuai diskusi sebelumnya.
            const { error } = await sb.from('chat_pesanan').insert([{ 
                pesanan_id_string: myID, 
                pengirim: 'pembeli', 
                pesan: teks 
            }]);

            if(!error) {
                tampilkanBubble(teks, 'pembeli');
                inp.value = "";
                
                // 2. Kirim Notif Telegram
                let t = `💬 *PESAN BARU:*\n"${teks}"\n\n_Ref: ${myID}_`;
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CID}&text=${encodeURIComponent(t)}&parse_mode=Markdown`);
            } else {
                console.log(error);
                alert("Gagal Kirim! Pastikan tabel 'chat_pesanan' sudah ada kolom 'pesanan_id_string'");
            }
        }

        function hubungkanRealtime() {
            sb.channel('live-grab').on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'chat_pesanan', 
                filter: `pesanan_id_string=eq.${myID}` 
            }, (p) => {
                if(p.new.pengirim === 'driver') tampilkanBubble(p.new.pesan, 'driver');
            }).subscribe();
        }

        async function loadChat() {
            const { data } = await sb.from('chat_pesanan').select('*').eq('pesanan_id_string', myID).order('created_at', {ascending: true});
            const box = document.getElementById('boxChat');
            box.innerHTML = '';
            if(data) data.forEach(m => tampilkanBubble(m.pesan, m.pengirim));
        }

        function tampilkanBubble(teks, pengirim) {
            const box = document.getElementById('boxChat');
            const style = (pengirim === 'pembeli') ? 'bubble-user' : 'bubble-admin';
            box.innerHTML += `<div class="${style}">${teks}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
