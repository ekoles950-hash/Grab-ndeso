<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #0F172A; color: white; text-align: left; }
        .input-dark { background-color: #1E293B; border: 1px solid #334155; color: white; transition: 0.3s; }
        .input-dark:focus { border-color: #10B981; outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .metode-card { background: #1E293B; border: 2px solid #334155; cursor: pointer; transition: 0.3s; text-align: center; color: #94A3B8; }
        .metode-card.active { border-color: #10B981; background: #064E3B; color: white; }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- STYLE CHAT PREMIUM MELAYANG --- */
        #chatWidget { 
            display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; 
            max-width: 360px; background: #1E293B; border-radius: 2.5rem; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid #334155; 
        }
        .chat-header { background: #10B981; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 350px; overflow-y: auto; padding: 20px; background: #0F172A; display: flex; flex-direction: column; gap: 12px; }
        .bubble-admin { background: #334155; color: white; padding: 12px 16px; border-radius: 20px 20px 20px 5px; font-size: 11px; max-width: 85%; align-self: flex-start; border: 1px solid #475569; }
        .bubble-user { background: #10B981; color: white; padding: 12px 16px; border-radius: 20px 20px 5px 20px; font-size: 11px; max-width: 85%; align-self: flex-end; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        
        .nav-bawah { background: #1E293B; border-top: 1px solid #334155; box-shadow: 0 -10px 25px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <nav class="bg-[#0F172A]/80 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2.5 rounded-2xl text-white shadow-lg text-xl">🛵</div>
            <h1 class="text-xl font-extrabold tracking-tighter uppercase italic">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-black text-green-500 border border-green-500/30 px-5 py-2 rounded-full uppercase active:scale-95 transition">Lacak</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5 animasi-up">
        <div class="mb-8 mt-2 px-1">
            <p id="sapaan-pagi" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Halo, Selamat <span id="waktu-hari">...</span>!</p>
            <h2 class="text-4xl font-black text-white tracking-tighter leading-tight mt-2 uppercase italic text-left">Mau Makan <span class="text-green-600">Apa?</span></h2>
            <p class="text-xs text-gray-400 mt-2">Mager? Tenang ojek kami siap anter sat-set.</p>
        </div>
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-end justify-center">
        <div class="bg-[#1E293B] w-full max-w-md rounded-t-[3rem] p-8 text-left border-t border-white/10 animasi-up">
            <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-black text-white mb-8 tracking-tighter uppercase italic">Data Antar</h3>
            <div class="space-y-4">
                <input type="text" id="f-nama" class="w-full p-4.5 rounded-2xl input-dark text-sm font-bold" placeholder="Nama Lengkap">
                <input type="number" id="f-wa" class="w-full p-4.5 rounded-2xl input-dark text-sm font-bold" placeholder="WhatsApp (081xxx)">
                <textarea id="f-alamat" oninput="cekAlamat()" rows="2" class="w-full p-4.5 rounded-2xl input-dark text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <div id="btn-cod" onclick="pilihMetode('COD')" class="metode-card active p-5 rounded-2xl shadow-sm">
                        <span class="text-2xl">💵</span><p class="text-[10px] font-black mt-2 uppercase">COD (CASH)</p>
                    </div>
                    <div id="btn-qris" onclick="pilihMetode('QRIS')" class="metode-card p-5 rounded-2xl shadow-sm">
                        <span class="text-2xl">📱</span><p class="text-[10px] font-black mt-2 uppercase">QRIS/TRANSFER</p>
                    </div>
                </div>

                <div id="box-total" class="hidden bg-[#064E3B]/30 border-2 border-green-900/50 p-6 rounded-[2rem]">
                    <div class="flex justify-between items-center"><p class="text-xs font-bold text-slate-400">Ongkir</p><p class="text-xs font-bold text-slate-400">Rp 5.000</p></div>
                    <div class="flex justify-between items-center border-t border-green-900/50 mt-2 pt-2">
                        <p class="text-xs font-bold text-white uppercase tracking-widest">Total Bayar</p>
                        <p id="txt-total-akhir" class="font-black text-green-500 text-2xl tracking-tighter">Rp 0</p>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="tutupModal()" class="flex-1 py-4.5 text-slate-500 font-bold text-sm">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2.5] bg-green-600 text-white py-4.5 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="modal-qris" class="fixed inset-0 bg-black/90 z-[80] hidden flex items-center justify-center p-6 text-left" onclick="tutupQRIS()">
        <div class="bg-white p-4 rounded-3xl max-w-sm w-full relative" onclick="event.stopPropagation()">
            <img src="QRIS.jpg" class="w-full rounded-2xl shadow-inner border border-gray-100 mb-4" alt="QRIS">
            <button onclick="tutupQRIS()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-black text-xs uppercase text-center">Tutup QRIS</button>
        </div>
    </div>

    <div id="chatWidget" class="animasi-up">
        <div class="chat-header text-white">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-comments text-xl"></i>
                <div class="text-left">
                    <p class="font-black text-xs leading-none">Live Chat Driver</p>
                    <p id="txt-ref-id" class="text-[9px] font-bold opacity-80 mt-1 uppercase italic">Ref: -</p>
                </div>
            </div>
            <button onclick="toggleChat()" class="text-white opacity-70 hover:opacity-100 font-bold text-xl">✕</button>
        </div>
        <div id="chatMessages" class="chat-body">
            <div class="bubble-admin">Halo Lur! Ada yang bisa kami bantu? Ketik pesan sampeyan di bawah ya..</div>
        </div>
        <div class="p-4 bg-[#1E293B] border-t border-white/5 flex gap-2">
            <input type="text" id="chatInput" onkeypress="if(event.key === 'Enter') sendChatMessage()" class="flex-1 bg-[#0F172A] text-white text-xs p-4 rounded-2xl outline-none border border-white/10 focus:border-green-600" placeholder="Ketik pesane sampeyan...">
            <button onclick="sendChatMessage()" class="bg-green-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa-solid fa-paper-plane text-lg"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-3 flex justify-around items-center z-[100] nav-bawah max-w-md mx-auto rounded-t-[2.5rem]">
        <button onclick="tanyaStatus()" class="flex flex-col items-center gap-1 group">
            <span class="text-xl group-active:scale-75 transition">🔍</span>
            <span class="text-[9px] font-black text-slate-500 uppercase">Lacak</span>
        </button>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 group">
            <div class="bg-green-600 p-3.5 rounded-2xl shadow-xl -mt-10 border-4 border-[#0F172A]">
                <span class="text-2xl">🏠</span>
            </div>
            <span class="text-[9px] font-black text-green-500 uppercase">Beranda</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1 group relative">
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-[#1E293B] animate-pulse"></div>
            <span class="text-xl group-active:scale-75 transition">💬</span>
            <span class="text-[9px] font-black text-slate-500 uppercase">Chat</span>
        </button>
    </div>

    <div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-50 animasi-up">
        <div class="bg-[#1E293B] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto border border-white/5">
            <div class="flex items-center gap-4 text-left">
                <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-xl shadow-lg">🛒</div>
                <p id="total-harga-bar" class="font-black text-2xl">Rp 0</p>
            </div>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4.5 rounded-2xl font-black text-[10px] uppercase">Checkout</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TELE_TOKEN = '8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM';
        const TELE_CHATID = '7933777456';
        
        let keranjang = {}, metodeBayar = 'COD', lastMsgId = 0;
        const ONGKIR = 5000;

        let mySessionId = localStorage.getItem('chatSessionId');
        if (!mySessionId) {
            mySessionId = "GN-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            localStorage.setItem('chatSessionId', mySessionId);
        }

        function setSapaan() {
            const h = new Date().getHours();
            let s = "Pagi"; if(h>=11 && h<15) s="Siang"; else if(h>=15 && h<18) s="Sore"; else if(h>=18 || h<4) s="Malam";
            document.getElementById('waktu-hari').innerText = s;
        }

        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-[#1E293B] rounded-[2.5rem] p-3 border border-white/5 flex flex-col group text-left">
                            <img src="${item.foto_url}" class="w-full h-40 object-cover rounded-[2rem] mb-4 group-hover:scale-105 transition duration-500">
                            <div class="flex-grow px-3">
                                <h3 class="font-bold text-[11px] text-white leading-tight uppercase">${item.nama_makanan}</h3>
                                <p class="text-green-500 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button id="btn-beli-${item.id}" onclick="showQtyControl('${item.id}', '${item.nama_makanan}', ${item.harga})" class="w-full bg-white/5 text-white py-4 rounded-[1.5rem] text-[9px] font-black uppercase mt-5 border border-white/5 transition">Beli</button>
                            <div id="qty-control-${item.id}" class="hidden flex items-center justify-between bg-[#0F172A] rounded-3xl p-1.5 mt-5">
                                <button onclick="kurangItem('${item.id}')" class="w-10 h-10 bg-[#1E293B] text-white rounded-2xl font-bold">-</button>
                                <span id="qty-${item.id}" class="font-black text-sm text-white">0</span>
                                <button onclick="tambahItem('${item.id}', '${item.nama_makanan}', ${item.harga})" class="w-10 h-10 bg-green-600 text-white rounded-2xl font-bold">+</button>
                            </div>
                        </div>`;
                });
            }
        }

        function showQtyControl(id, n, h) { document.getElementById(`btn-beli-${id}`).classList.add('hidden'); document.getElementById(`qty-control-${id}`).classList.remove('hidden'); tambahItem(id, n, h); }
        function tambahItem(id, n, h) { if (!keranjang[id]) keranjang[id] = { nama: n, harga: h, qty: 1 }; else keranjang[id].qty += 1; updateTampilan(id); }
        function kurangItem(id) { if (keranjang[id]) { keranjang[id].qty -= 1; if (keranjang[id].qty <= 0) { delete keranjang[id]; document.getElementById(`qty-control-${id}`).classList.add('hidden'); document.getElementById(`btn-beli-${id}`).classList.remove('hidden'); } } updateTampilan(id); }
        function updateTampilan(id) {
            const q = document.getElementById(`qty-${id}`); if (q) q.innerText = keranjang[id] ? keranjang[id].qty : 0;
            let t = 0; for (let k in keranjang) t += keranjang[k].harga * keranjang[k].qty;
            const cb = document.getElementById('cart-bar');
            if (t > 0) { cb.classList.remove('hidden'); document.getElementById('total-harga-bar').innerText = `Rp ${t.toLocaleString('id-ID')}`; } else cb.classList.add('hidden');
        }

        function pilihMetode(m) { metodeBayar = m; document.getElementById('btn-cod').classList.toggle('active', m === 'COD'); document.getElementById('btn-qris').classList.toggle('active', m === 'QRIS'); }
        function cekAlamat() { let t = 0; for (let k in keranjang) t += keranjang[k].harga * keranjang[k].qty; if (document.getElementById('f-alamat').value.length > 2) { document.getElementById('box-total').classList.remove('hidden'); document.getElementById('txt-total-akhir').innerText = `Rp ${(t + ONGKIR).toLocaleString('id-ID')}`; } }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function bukaQRIS() { document.getElementById('modal-qris').classList.remove('hidden'); }
        function tutupQRIS() { document.getElementById('modal-qris').classList.add('hidden'); }

        async function kirimOrderan() {
            const n = document.getElementById('f-nama').value, w = document.getElementById('f-wa').value, a = document.getElementById('f-alamat').value;
            if (!n || !a) return alert("Data belum lengkap!");
            let tm = 0, lm = []; for (let k in keranjang) { tm += keranjang[k].harga * keranjang[k].qty; lm.push(`${keranjang[k].nama} (x${keranjang[k].qty})`); }
            const { data } = await sb.from('pesanan_ojek').insert([{ nama_pembeli: n, alamat_kirim: a + " [" + lm.join(", ") + "]", no_wa: w, status: 'pending', total_harga: tm, metode_bayar: metodeBayar }]).select();
            if (data) {
                const pt = `🚨 *ORDER BARU* \n👤 Nama: ${n}\n📍 Alamat: ${a}\n🍱 Menu: ${lm.join(", ")}\n💰 Total: Rp ${(tm + ONGKIR).toLocaleString('id-ID')}\n🆔 Ref: ${mySessionId}`;
                fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(pt)}&parse_mode=Markdown`);
                tampilkanHalamanTracking(data[0].id, 'pending', tm, metodeBayar);
                tutupModal(); keranjang = {}; 
            }
        }

        function tampilkanHalamanTracking(id, statusAwal, totalMakan, metode) {
            const totalBayar = totalMakan + ONGKIR;
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-4 bg-[#1E293B] p-10 rounded-[3.5rem] shadow-2xl border border-white/10 text-center animasi-up">
                    <h3 id="txt-status" class="text-3xl font-black text-green-500 uppercase italic tracking-tighter">${statusAwal}</h3>
                    <div class="relative h-1.5 bg-gray-800 rounded-full my-16 mx-4">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all duration-700" style="width:10%"></div>
                        <div id="motor" class="absolute -top-10 text-5xl transition-all duration-700" style="left:0%; transform: translateX(-50%);">🛵</div>
                    </div>
                    <div class="bg-[#0F172A] rounded-3xl p-6 mb-6 border border-white/5 text-left text-left">
                        <div class="flex justify-between items-center text-left">
                            <span class="text-xs font-bold text-slate-400">Total Tagihan</span>
                            <span class="text-2xl font-black text-green-500 text-left">Rp ${totalBayar.toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                    ${metode === 'QRIS' ? `<button onclick="bukaQRIS()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] mb-4 shadow-xl uppercase">📱 QRIS BAYAR</button>` : ''}
                    <button onclick="window.location.reload()" class="bg-[#0F172A] text-white w-full py-4 rounded-2xl font-black text-[10px] uppercase border border-white/5">Menu Utama</button>
                </div>`;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);
            sb.channel('track-' + id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, (p) => { geserMotor(p.new.status); }).subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor'), b = document.getElementById('bar-progress'), t = document.getElementById('txt-status');
            if(!m) return; t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; m.innerHTML = "🛵"; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; m.innerHTML = "👨‍🍳"; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; }
        }

        function tanyaStatus() {
            const n = prompt("Cek Pesanan (Nama):");
            if (n) { sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => { if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status, data[0].total_harga || 0, data[0].metode_bayar || 'COD'); else alert("Gak ada pesanan!"); }); }
        }

        // --- CHAT LOGIC ---
        function toggleChat() { const w = document.getElementById('chatWidget'); document.getElementById('txt-ref-id').innerText = "Ref: " + mySessionId; w.style.display = (w.style.display === 'block') ? 'none' : 'block'; }
        async function pollTelegram() {
            try { const res = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?offset=${lastMsgId + 1}`); const data = await res.json();
                if (data.ok && data.result.length > 0) { data.result.forEach(u => { const msg = u.message; lastMsgId = u.update_id;
                    if (msg && msg.from.id.toString() === TELE_CHATID && msg.reply_to_message && msg.reply_to_message.text.includes(mySessionId)) { addBubble(msg.text, 'admin'); } }); }
            } catch (e) {} setTimeout(pollTelegram, 3000);
        }
        async function sendChatMessage() {
            const input = document.getElementById('chatInput'); if(!input.value.trim()) return;
            addBubble(input.value, 'user'); const tTele = `💬 *CHAT TAMU:*\n"${input.value}"\n\n_Ref: ${mySessionId}_`;
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(tTele)}&parse_mode=Markdown`); input.value = '';
        }
        function addBubble(t, s) { const box = document.getElementById('chatMessages'), div = document.createElement('div'); div.className = (s === 'user') ? 'bubble-user animasi-up' : 'bubble-admin animasi-up'; div.innerHTML = t; box.appendChild(div); box.scrollTop = box.scrollHeight; }

        setSapaan(); loadMenu(); pollTelegram();
    </script>
</body>
</html>
