<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .input-mewah { border: 2px solid #F3F4F6; transition: all 0.3s; }
        .input-mewah:focus { border-color: #10B981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); outline: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animasi-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#F9FAFB] pb-32">

    <nav class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white shadow-lg shadow-green-200">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter">GRAB<span class="text-green-600 italic">NDESO</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-extrabold text-green-600 border-2 border-green-600 px-4 py-2 rounded-full uppercase tracking-tighter">Lacak Pesanan</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5">
        <h2 class="text-xl font-extrabold text-gray-800 mb-6 flex items-center gap-2">
            Pesan Menu Favorit <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-lg">PROMO</span>
        </h2>
        
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="bg-white h-52 rounded-[2rem] animate-pulse"></div>
            <div class="bg-white h-52 rounded-[2rem] animate-pulse"></div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] p-8 animasi-up">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-extrabold text-gray-800 mb-2 text-center">Detail Pengiriman</h3>
            <p class="text-xs text-gray-400 text-center mb-8 font-semibold">Lengkapi data untuk memulai pengantaran</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase ml-2">Nama Lengkap</label>
                    <input type="text" id="f-nama" class="w-full p-4 mt-1 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Contoh: Bos Geng">
                </div>
                <div>
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase ml-2">WhatsApp (Aktif)</label>
                    <input type="number" id="f-wa" class="w-full p-4 mt-1 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="0812xxxxxx">
                </div>
                <div>
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase ml-2">Alamat Lengkap (RT/RW/No)</label>
                    <textarea id="f-alamat" rows="3" class="w-full p-4 mt-1 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Contoh: Jl. Mawar No. 5 RT 01/02"></textarea>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button onclick="tutupModal()" class="flex-1 py-4 text-gray-400 font-bold text-sm">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-green-200">KONFIRMASI PESANAN</button>
            </div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 hidden z-50">
        <div class="bg-[#1A1A1A] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto border border-white/10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-green-900">🛒</div>
                <div>
                    <p id="total-harga" class="font-extrabold text-lg leading-none">Rp 0</p>
                    <p id="total-item" class="text-[9px] text-gray-400 font-bold uppercase mt-1 tracking-widest">0 Item dipilih</p>
                </div>
            </div>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4 rounded-2xl font-black text-xs active:scale-95 transition-all uppercase tracking-tighter">Bayar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];

        async function loadMenu() {
            const container = document.getElementById('daftar-menu');
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2.5rem] p-3 shadow-sm border border-gray-50 flex flex-col group">
                            <img src="${item.foto_url || 'https://via.placeholder.com/300'}" class="w-full h-36 object-cover rounded-[2rem] mb-3 group-hover:scale-105 transition duration-500">
                            <div class="flex-grow px-2">
                                <h3 class="font-bold text-xs text-gray-800 leading-tight">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button onclick="masukKeranjang('${item.nama_makanan}', ${item.harga})" 
                                class="w-full mt-4 bg-gray-50 text-gray-800 py-3 rounded-2xl text-[9px] font-black hover:bg-green-600 hover:text-white transition-all uppercase">
                                + Tambah
                            </button>
                        </div>`;
                });
            }
        }

        function masukKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            document.getElementById('cart-bar').classList.remove('hidden');
            const total = keranjang.reduce((s, i) => s + i.harga, 0);
            document.getElementById('total-harga').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('total-item').innerText = `${keranjang.length} Item dipilih`;
        }

        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function kirimOrderan() {
            const nama = document.getElementById('f-nama').value;
            const wa = document.getElementById('f-wa').value;
            const alamat = document.getElementById('f-alamat').value;

            if (!nama || !wa || !alamat) return alert("Lengkapi data dulu ya Bos!");

            const { data, error } = await sb.from('pesanan_ojek').insert([{ 
                nama_pembeli: nama, 
                alamat_kirim: alamat, 
                status: 'pending' 
            }]).select();

            if (data) {
                tutupModal();
                keranjang = [];
                tampilkanHalamanTracking(data[0].id, 'pending');
            }
        }

        function tampilkanHalamanTracking(id, statusAwal) {
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-8 bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-gray-50">
                    <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-8 text-5xl">🥡</div>
                    <h3 id="txt-status" class="text-3xl font-black text-gray-800 italic uppercase tracking-tighter">${statusAwal}</h3>
                    <p id="txt-desc" class="text-xs text-gray-400 mt-3 font-bold px-4 leading-relaxed">Pesanan dikonfirmasi. Driver sedang menuju lokasi.</p>
                    
                    <div class="relative h-2 bg-gray-100 rounded-full mb-16 mt-16 mx-6">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                        <div id="motor" class="absolute -top-12 text-5xl transition-all duration-700" style="left:0%">🛵</div>
                    </div>

                    <button onclick="window.location.reload()" class="bg-gray-100 text-gray-800 w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Kembali Berbelanja</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);

            sb.channel('track-' + id)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, 
                (p) => { geserMotor(p.new.status); })
                .subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            const d = document.getElementById('txt-desc');
            if (!m) return;

            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; d.innerText = "Orderan masuk. Mencari driver terdekat..."; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; d.innerText = "Restoran sedang menyiapkan hidanganmu."; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; d.innerText = "Driver sedang meluncur ke lokasi!"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; d.innerText = "Pesanan sampai! Selamat makan lur."; }
        }

        function tanyaStatus() {
            const n = prompt("Masukkan Nama saat memesan:");
            if (n) {
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => {
                    if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status);
                    else alert("Gak ada pesanan atas nama itu!");
                });
            }
        }

        loadMenu();
    </script>
</body>
</html>
