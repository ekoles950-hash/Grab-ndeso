<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; text-align: left; }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Style Chat Gelembung */
        .bubble-driver { background: #1F2937; color: white; border-radius: 20px 20px 20px 4px; }
        .bubble-user { background: #10B981; color: white; border-radius: 20px 20px 4px 20px; align-self: flex-end; }
        
        /* Animasi Muncul Chat */
        #live-chat-modal { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); opacity: 0; pointer-events: none; }
        #live-chat-modal.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-[#0F172A] pb-40 text-left"> <nav class="bg-white/95 backdrop-blur p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white text-xl">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter uppercase italic">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5 animasi-up">
        <div class="mb-8 mt-2 px-1 text-left">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Halo, Selamat Makan!</p>
            <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic">Mau Makan <span class="text-green-600">Apa?</span></h2>
        </div>
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
             </div>
    </div>

    <div id="live-chat-modal" class="fixed inset-x-0 bottom-0 z-[150] flex justify-center p-4">
        <div class="bg-[#1E293B] w-full max-w-md rounded-[2.5rem] shadow-2xl border border-gray-700 overflow-hidden flex flex-col h-[70vh]">
            <div class="bg-[#10B981] p-5 flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">💬</div>
                    <div>
                        <h4 class="text-white font-black text-sm leading-none">Live Chat GrabNdeso</h4>
                        <p class="text-green-100 text-[10px] mt-1 font-bold">🟢 Online</p>
                    </div>
                </div>
                <button onclick="toggleChat()" class="text-white bg-black/20 w-8 h-8 rounded-full font-bold">✕</button>
            </div>

            <div id="box-chat" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 bg-[#0F172A]">
                <div class="bubble-driver p-4 text-xs font-bold shadow-md max-w-[85%]">
                    Halo Lur! Ada yang bisa kami bantu? Ketik pesane sampeyan dibawah ya..
                </div>
            </div>

            <div class="p-5 bg-[#1E293B] border-t border-gray-700 flex gap-3">
                <input type="text" id="input-pesan" class="flex-1 p-4 bg-[#0F172A] text-white rounded-2xl outline-none text-sm font-bold border border-gray-700 focus:border-green-500" placeholder="Ketik pesane sampeyan...">
                <button onclick="kirimChat()" class="bg-green-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-green-900/20">
                    <span class="text-xl">✈️</span>
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-around items-center z-[100] max-w-md mx-auto rounded-t-[2.5rem] shadow-[0_-10px_25px_rgba(0,0,0,0.1)]">
        <button onclick="tanyaStatus()" class="flex flex-col items-center gap-1 group">
            <span class="text-xl">🔍</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Lacak</span>
        </button>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 group">
            <div class="bg-green-600 p-3 rounded-2xl shadow-lg -mt-8 border-4 border-[#F9FAFB]">
                <span class="text-xl">🏠</span>
            </div>
            <span class="text-[10px] font-black text-green-600 uppercase tracking-tighter">Beranda</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1 group relative">
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></div>
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Chat</span>
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Buka/Tutup Chat
        function toggleChat() {
            document.getElementById('live-chat-modal').classList.toggle('active');
        }

        async function kirimChat() {
            const input = document.getElementById('input-pesan');
            const pesan = input.value;
            if(!pesan) return;

            // Tambahkan Bubble User ke Layar
            const box = document.getElementById('box-chat');
            box.innerHTML += `<div class="bubble-user p-4 text-xs font-bold shadow-md max-w-[85%]">${pesan}</div>`;
            
            // Scroll ke paling bawah
            box.scrollTop = box.scrollHeight;
            input.value = '';

            // Kirim ke Telegram (Biar Bos dapet notif)
            const TELE_TOKEN = '8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM';
            const TELE_CHATID = '7933777456';
            const teks = `💬 *PESAN BARU DARI TAMU:* \n\n"${pesan}"`;
            await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(teks)}&parse_mode=Markdown`);
        }

        // --- Load Menu (Tetap Sesuai Fitur Bos) ---
        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-[#1E293B] rounded-[2rem] p-3 border border-gray-700 flex flex-col text-left">
                            <img src="${item.foto_url}" onerror="this.remove()" class="w-full h-36 object-cover rounded-[1.5rem] mb-3">
                            <div class="flex-grow px-2">
                                <h3 class="font-bold text-[11px] text-white leading-tight">${item.nama_makanan}</h3>
                                <p class="text-green-500 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button class="w-full bg-white/5 text-white py-3 rounded-2xl text-[9px] font-black uppercase mt-4">Beli</button>
                        </div>`;
                });
            }
        }
        loadMenu();
    </script>
</body>
</html>
