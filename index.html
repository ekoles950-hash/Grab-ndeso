<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; text-align: left; }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* STYLE CHAT PREMIUM */
        #chatWidget { display: none; position: fixed; bottom: 100px; left: 20px; right: 20px; max-width: 350px; background: #1E293B; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid #334155; }
        .chat-header { background: #10B981; padding: 15px; display: flex; justify-content: space-between; items-center; }
        .chat-body { height: 320px; overflow-y: auto; padding: 20px; background: #0F172A; display: flex; flex-direction: column; gap: 10px; }
        .bubble-admin { background: #334155; color: white; padding: 10px 15px; border-radius: 18px 18px 18px 5px; font-size: 12px; max-width: 85%; align-self: flex-start; }
        .bubble-user { background: #10B981; color: white; padding: 10px 15px; border-radius: 18px 18px 5px 18px; font-size: 12px; max-width: 85%; align-self: flex-end; }
        
        /* NAV BAWAH */
        .nav-bawah { box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-40">

    <nav class="bg-white/90 backdrop-blur p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white text-xl">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter uppercase italic">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
    </nav>

    <div id="halaman-menu" class="max-w-md mx-auto p-5 animasi-up">
        <div class="mb-6">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Halo Bos!</p>
            <h2 class="text-3xl font-black text-gray-800 tracking-tighter uppercase italic">Menu <span class="text-green-600">Gacor</span></h2>
        </div>
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="halaman-lacak" class="hidden max-w-md mx-auto p-5 animasi-up">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl text-center">
            <h3 id="txt-status" class="text-2xl font-black text-gray-800 uppercase italic">PENDING</h3>
            <div class="relative h-2 bg-gray-100 rounded-full my-12 mx-4">
                <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                <div id="motor" class="absolute -top-8 text-4xl transition-all duration-700" style="left:0%; transform: translateX(-50%);">🛵</div>
            </div>
            <button onclick="bukaHalamanMenu()" class="w-full bg-gray-100 text-gray-400 py-4 rounded-2xl font-black text-xs uppercase">Kembali</button>
        </div>
    </div>

    <div id="chatWidget">
        <div class="chat-header text-white">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-comments"></i>
                <div class="text-left">
                    <p class="font-black text-xs leading-none">Chat GrabNdeso</p>
                    <p id="chat-ref" class="text-[9px] font-bold opacity-80 mt-1 uppercase">Ref: -</p>
                </div>
            </div>
            <button onclick="toggleChat()" class="text-xl">✕</button>
        </div>
        <div id="boxPesan" class="chat-body">
            <div class="bubble-admin">Halo Bos! Ada yang bisa dibantu? Pesanan sedang diproses ya..</div>
        </div>
        <div class="p-4 bg-[#1E293B] border-t border-gray-700 flex gap-2">
            <input type="text" id="inputChat" class="flex-1 bg-[#0F172A] text-white text-xs p-3 rounded-xl outline-none border border-gray-700" placeholder="Tanya admin...">
            <button onclick="kirimChat()" class="bg-green-600 text-white w-10 h-10 rounded-xl flex items-center justify-center">✈️</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-around items-center z-[100] nav-bawah max-w-md mx-auto rounded-t-[2.5rem]">
        <button onclick="tanyaStatus()" class="flex flex-col items-center gap-1">
            <span class="text-xl">🔍</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Lacak</span>
        </button>
        <button onclick="bukaHalamanMenu()" class="flex flex-col items-center gap-1">
            <div class="bg-green-600 p-3 rounded-2xl shadow-lg -mt-8 border-4 border-[#F9FAFB]">
                <span class="text-xl">🏠</span>
            </div>
            <span class="text-[10px] font-black text-green-600 uppercase tracking-tighter">Beranda</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1">
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Chat</span>
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const BOT_TOKEN = "8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM";
        const CHAT_ID = "7933777456";
        let currentRef = localStorage.getItem('last_ref') || "ID-GUEST";

        function toggleChat() {
            let w = document.getElementById('chatWidget');
            document.getElementById('chat-ref').innerText = "Ref: " + currentRef;
            w.style.display = (w.style.display === 'block') ? 'none' : 'block';
        }

        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2rem] p-3 shadow-sm border border-gray-100 text-left">
                            <img src="${item.foto_url}" class="w-full h-32 object-cover rounded-2xl mb-3">
                            <h3 class="font-bold text-[10px] text-gray-800 leading-tight">${item.nama_makanan}</h3>
                            <p class="text-green-600 font-black text-xs mt-1">Rp ${item.harga.toLocaleString()}</p>
                            <button onclick="orderLangsung('${item.nama_makanan}')" class="w-full bg-gray-50 py-2 rounded-xl text-[9px] font-black uppercase mt-3">Order</button>
                        </div>`;
                });
            }
        }

        function orderLangsung(nama) {
            let user = prompt("Nama Pembeli:");
            if(user) {
                currentRef = "GN-" + Math.random().toString(36).substr(2, 4).toUpperCase();
                localStorage.setItem('last_ref', currentRef);
                kirimTelegram(`🚨 *ORDER BARU!* \n👤 Nama: ${user}\n🍱 Menu: ${nama}\n🆔 Ref: ${currentRef}`);
                alert("Orderan dikirim! Silahkan cek di menu Lacak.");
            }
        }

        async function kirimChat() {
            let inp = document.getElementById('inputChat');
            let box = document.getElementById('boxPesan');
            if(!inp.value) return;
            
            box.innerHTML += `<div class="bubble-user">${inp.value}</div>`;
            kirimTelegram(`💬 *CHAT TAMU:*\n"${inp.value}"\n\n_Ref: ${currentRef}_`);
            inp.value = "";
            box.scrollTop = box.scrollHeight;
        }

        function kirimTelegram(teks) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(teks)}&parse_mode=Markdown`);
        }

        function bukaHalamanMenu() {
            document.getElementById('halaman-menu').classList.remove('hidden');
            document.getElementById('halaman-lacak').classList.add('hidden');
        }

        function tanyaStatus() {
            document.getElementById('halaman-menu').classList.add('hidden');
            document.getElementById('halaman-lacak').classList.remove('hidden');
            // Logika geser motor Bos yang sudah ada bisa ditaruh sini
        }

        loadMenu();
    </script>
</body>
</html>
