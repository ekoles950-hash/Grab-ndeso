<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Official Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; text-align: left; }
        .animasi-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* STYLE CHAT PREMIUM */
        #chatWidget { 
            display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; 
            max-width: 360px; background: #1E293B; border-radius: 2.5rem; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid #334155; 
        }
        .chat-header { background: #10B981; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 350px; overflow-y: auto; padding: 20px; background: #0F172A; display: flex; flex-direction: column; gap: 12px; }
        .bubble-admin { background: #334155; color: white; padding: 12px 16px; border-radius: 20px 20px 20px 5px; font-size: 12px; max-width: 85%; align-self: flex-start; border: 1px solid #475569; }
        .bubble-user { background: #10B981; color: white; padding: 12px 16px; border-radius: 20px 20px 5px 20px; font-size: 12px; max-width: 85%; align-self: flex-end; }
        
        .nav-bawah { box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-32">

    <nav class="bg-white/90 backdrop-blur p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white text-xl">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter uppercase italic">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
    </nav>

    <div id="halaman-menu" class="max-w-md mx-auto p-5 animasi-up">
        <div class="mb-6">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Mager? Tenang, ojek kami siap anter sat-set.</p>
            <h2 class="text-3xl font-black text-gray-800 tracking-tighter uppercase italic leading-none">Menu <span class="text-green-600">Andalan</span></h2>
        </div>
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="halaman-lacak" class="hidden max-w-md mx-auto p-5 animasi-up">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl text-center border border-gray-50">
            <h3 id="txt-status" class="text-2xl font-black text-gray-800 uppercase italic">MENUNGGU...</h3>
            <div class="relative h-2 bg-gray-100 rounded-full my-12 mx-4">
                <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                <div id="motor" class="absolute -top-8 text-4xl transition-all duration-700 flex items-center justify-center" style="left:0%; transform: translateX(-50%);">🛵</div>
            </div>
            <button onclick="bukaMenu()" class="w-full bg-gray-100 text-gray-400 py-4 rounded-2xl font-black text-[10px] uppercase">Kembali Ke Menu</button>
        </div>
    </div>

    <div id="chatWidget" class="animasi-up">
        <div class="chat-header text-white">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-comments text-xl"></i>
                <div class="text-left">
                    <p class="font-black text-xs leading-none">Live Chat GrabNdeso</p>
                    <p id="txt-ref-id" class="text-[9px] font-bold opacity-80 mt-1 uppercase italic">Ref: -</p>
                </div>
            </div>
            <button onclick="toggleChat()" class="text-white opacity-70 hover:opacity-100 font-bold">✕</button>
        </div>
        <div id="chatMessages" class="chat-body">
            <div class="bubble-admin">Halo Bos! Ada yang bisa kami bantu? Ketik pesan sampeyan di bawah ya..</div>
        </div>
        <div class="p-4 bg-[#1E293B] border-t border-gray-700 flex gap-2">
            <input type="text" id="chatInput" onkeypress="if(event.key === 'Enter') sendChatMessage()" class="flex-1 bg-[#0F172A] text-white text-xs p-4 rounded-2xl outline-none border border-gray-700" placeholder="Ketik pesene sampeyan...">
            <button onclick="sendChatMessage()" class="bg-green-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa-solid fa-paper-plane text-lg"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-around items-center z-[100] nav-bawah max-w-md mx-auto rounded-t-[2.5rem]">
        <button onclick="tanyaStatus()" class="flex flex-col items-center gap-1 group">
            <span class="text-xl">🔍</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Lacak</span>
        </button>
        <button onclick="bukaMenu()" class="flex flex-col items-center gap-1">
            <div class="bg-green-600 p-3 rounded-2xl shadow-lg -mt-8 border-4 border-[#F9FAFB]">
                <span class="text-xl">🏠</span>
            </div>
            <span class="text-[10px] font-black text-green-600 uppercase tracking-tighter">Beranda</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1 group">
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Chat</span>
        </button>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TELE_TOKEN = "8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM";
        const ADMIN_CHAT_ID = "7933777456";
        let lastMsgId = 0;

        // ID Chat Unik
        let mySessionId = localStorage.getItem('chatSessionId');
        if (!mySessionId) {
            mySessionId = "GN-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            localStorage.setItem('chatSessionId', mySessionId);
        }

        // --- 1. FITUR MENU (SUPABASE) ---
        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2rem] p-3 shadow-sm border border-gray-100 flex flex-col text-left">
                            <img src="${item.foto_url}" class="w-full h-32 object-cover rounded-2xl mb-3">
                            <div class="px-2">
                                <h3 class="font-bold text-[10px] text-gray-800 leading-tight">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-black text-xs mt-1">Rp ${item.harga.toLocaleString()}</p>
                            </div>
                            <button onclick="orderLangsung('${item.nama_makanan}')" class="bg-gray-50 py-2 rounded-xl text-[9px] font-black uppercase mt-3 hover:bg-green-600 hover:text-white transition">Order</button>
                        </div>`;
                });
            }
        }

        async function orderLangsung(menu) {
            const nama = prompt("Nama Pembeli:");
            if(!nama) return;
            const msg = `🚨 *ORDER BARU!* \n👤 Nama: ${nama}\n🍱 Menu: ${menu}\n🆔 Ref: ${mySessionId}`;
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            alert("Pesanan terkirim Bos! Pantau status di menu Lacak.");
        }

        // --- 2. FITUR LACAK (REALTIME) ---
        function bukaMenu() {
            document.getElementById('halaman-menu').classList.remove('hidden');
            document.getElementById('halaman-lacak').classList.add('hidden');
        }

        function tanyaStatus() {
            const n = prompt("Masukkan Nama Pembeli:");
            if (n) {
                document.getElementById('halaman-menu').classList.add('hidden');
                document.getElementById('halaman-lacak').classList.remove('hidden');
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => { 
                    if (data && data.length > 0) {
                        geserMotor(data[0].status);
                        // Subscribe Realtime
                        sb.channel('track-' + data[0].id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+data[0].id }, (p) => { geserMotor(p.new.status); }).subscribe();
                    }
                });
            }
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            if(!m) return;
            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; m.innerHTML = "🛵"; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; m.innerHTML = "👨‍🍳"; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; }
        }

        // --- 3. FITUR CHAT POLLING ---
        function toggleChat() {
            const widget = document.getElementById('chatWidget');
            document.getElementById('txt-ref-id').innerText = "Ref: " + mySessionId;
            widget.style.display = (widget.style.display === 'block') ? 'none' : 'block';
        }

        async function pollTelegram() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?offset=${lastMsgId + 1}`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        const msg = update.message;
                        lastMsgId = update.update_id;
                        if (msg && msg.from.id.toString() === ADMIN_CHAT_ID && msg.reply_to_message && msg.reply_to_message.text.includes(mySessionId)) {
                            addBubble(msg.text, 'admin');
                        }
                    });
                }
            } catch (e) { console.log("Polling delay"); }
            setTimeout(pollTelegram, 3000);
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            addBubble(input.value, 'user');
            const textToTele = `💬 *CHAT TAMU:*\n"${input.value}"\n\n_Ref: ${mySessionId}_`;
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(textToTele)}&parse_mode=Markdown`);
            input.value = '';
        }

        function addBubble(text, sender) {
            const chatMsgs = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = (sender === 'user') ? 'bubble-user animasi-up' : 'bubble-admin animasi-up';
            div.innerHTML = text;
            chatMsgs.appendChild(div);
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
        }

        // Jalankan Semuanya
        loadMenu();
        pollTelegram();
    </script>
</body>
</html>
