<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .input-mewah { border: 2px solid #F3F4F6; transition: 0.3s; }
        .input-mewah:focus { border-color: #10B981; outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .metode-card { border: 2px solid #F3F4F6; cursor: pointer; transition: 0.3s; text-align: center; }
        .metode-card.active { border-color: #10B981; background: #ECFDF5; }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F9FAFB] pb-32">

    <nav class="bg-white/90 backdrop-blur p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between text-left">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2.5 rounded-2xl text-white shadow-lg shadow-green-100 text-xl">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter">GRAB<span class="text-green-600 italic">NDESO</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-extrabold text-green-600 border-2 border-green-600 px-5 py-2.5 rounded-full uppercase tracking-widest">Lacak</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5 text-left">
        <div id="daftar-menu" class="grid grid-cols-2 gap-4 text-left">
            <div class="bg-white h-52 rounded-[2rem] animate-pulse text-left"></div>
            <div class="bg-white h-52 rounded-[2rem] animate-pulse text-left"></div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] p-8 text-left overflow-y-auto max-h-[95vh] animasi-up">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-black text-gray-800 mb-8 text-center tracking-tighter text-left">Data Pesanan</h3>
            
            <div class="space-y-4 text-left">
                <input type="text" id="f-nama" class="w-full p-4.5 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Nama Lengkap">
                <input type="number" id="f-wa" class="w-full p-4.5 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="WhatsApp (081xxx)">
                <textarea id="f-alamat" oninput="cekAlamat()" rows="2" class="w-full p-4.5 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                
                <p class="text-[11px] font-black text-gray-400 uppercase ml-2 tracking-wider text-left">Metode Pembayaran</p>
                <div class="grid grid-cols-2 gap-3 pb-2 text-left">
                    <div id="btn-cod" onclick="pilihMetode('COD')" class="metode-card active p-5 rounded-2xl text-center shadow-sm">
                        <span class="text-2xl">💵</span>
                        <p class="text-[10px] font-black mt-2 uppercase tracking-widest">COD (Cash)</p>
                    </div>
                    <div id="btn-qris" onclick="pilihMetode('QRIS')" class="metode-card p-5 rounded-2xl text-center shadow-sm">
                        <span class="text-2xl">📱</span>
                        <p class="text-[10px] font-black mt-2 uppercase tracking-widest">QRIS / Transfer</p>
                    </div>
                </div>

                <div id="box-total" class="hidden bg-green-50 border-2 border-green-100 p-6 rounded-[2rem] text-left">
                    <div class="flex justify-between items-center pb-2 text-left">
                        <span class="text-xs font-extrabold text-green-600 uppercase tracking-widest">Ongkir</span>
                        <span class="text-green-600 font-bold text-sm">Rp 5.000</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-green-100 pt-3 text-left">
                        <p class="text-xs font-black text-gray-800 uppercase tracking-wider">Total Bayar</p>
                        <p id="txt-total-akhir" class="font-black text-green-600 text-2xl tracking-tighter">Rp 0</p>
                    </div>
                </div>
            </div>

            <div class="mt-10 flex gap-4 text-left">
                <button onclick="tutupModal()" class="flex-1 py-4.5 text-gray-400 font-bold text-sm">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2.5] bg-green-600 text-white py-4.5 rounded-2xl font-black text-sm shadow-xl transition">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="modal-qris" class="fixed inset-0 bg-black/80 z-[80] hidden flex items-center justify-center p-6 text-left" onclick="tutupQRIS()">
        <div class="bg
