<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Chat Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0F172A; }
        .animasi-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* MODAL CHAT MODEL BASECAMP */
        #chatWidget { 
            display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; 
            max-width: 360px; background: #1E293B; border-radius: 2.5rem; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            z-index: 1000; border: 1px solid #334155; 
        }
        .chat-header { background: #10B981; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 350px; overflow-y: auto; padding: 20px; background: #0F172A; display: flex; flex-direction: column; gap: 12px; }
        
        /* BUBBLE CHAT */
        .bubble-admin { background: #334155; color: white; padding: 12px 16px; border-radius: 20px 20px 20px 5px; font-size: 12px; max-width: 85%; align-self: flex-start; border: 1px solid #475569; }
        .bubble-user { background: #10B981; color: white; padding: 12px 16px; border-radius: 20px 20px 5px 20px; font-size: 12px; max-width: 85%; align-self: flex-end; }
        
        .nav-bawah { box-shadow: 0 -10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="pb-32">

    <nav class="bg-white/10 backdrop-blur p-4 sticky top-0 z-40 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white text-xl">🛵</div>
            <h1 class="text-xl font-extrabold text-white tracking-tighter uppercase italic text-left">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-5 text-left">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Halo Bos!</p>
        <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic leading-none">Mau Makan <br><span class="text-green-600">Apa Hari Ini?</span></h2>
    </div>

    <div id="chatWidget" class="animasi-up">
        <div class="chat-header text-white">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-comments text-xl"></i>
                <div class="text-left">
                    <p class="font-black text-xs leading-none">Live Chat GrabNdeso</p>
                    <p id="txt-ref-id" class="text-[9px] font-bold opacity-80 mt-1 uppercase">Ref: -</p>
                </div>
            </div>
            <button onclick="toggleChat()" class="text-white opacity-70 hover:opacity-100 font-bold">✕</button>
        </div>

        <div id="chatMessages" class="chat-body">
            <div class="bubble-admin">
                Halo Bos! Ada yang bisa kami bantu? <br>
                Ketik pesane sampeyan dibawah ya..
            </div>
        </div>

        <div class="p-4 bg-[#1E293B] border-t border-gray-700 flex gap-2">
            <input type="text" id="chatInput" 
                onkeypress="if(event.key === 'Enter') sendChatMessage()"
                class="flex-1 bg-[#0F172A] text-white text-xs p-4 rounded-2xl outline-none border border-gray-700 focus:border-green-500" 
                placeholder="Ketik pesene sampeyan...">
            <button onclick="sendChatMessage()" class="bg-green-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa-solid fa-paper-plane text-lg"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-around items-center z-[100] nav-bawah max-w-md mx-auto rounded-t-[2.5rem]">
        <button class="flex flex-col items-center gap-1 opacity-30"><span class="text-xl">🔍</span><span class="text-[9px] font-black uppercase">Lacak</span></button>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1">
            <div class="bg-green-600 p-3 rounded-2xl shadow-lg -mt-8 border-4 border-[#0F172A]">
                <span class="text-xl">🏠</span>
            </div>
            <span class="text-[10px] font-black text-green-600 uppercase tracking-tighter">Beranda</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1">
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Chat</span>
        </button>
    </div>

    <script>
        // --- PENGATURAN CHAT (TOKEN BOS) ---
        const CHAT_BOT_TOKEN = "8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM";
        const ADMIN_CHAT_ID = "7933777456";
        let lastMsgId = 0;
        let isStoreOpen = true; 

        // Generate Ref ID
        let mySessionId = localStorage.getItem('chatSessionId');
        if (!mySessionId) {
            mySessionId = "GN-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            localStorage.setItem('chatSessionId', mySessionId);
        }

        function toggleChat() {
            const widget = document.getElementById('chatWidget');
            document.getElementById('txt-ref-id').innerText = "Ref: " + mySessionId;
            widget.style.display = (widget.style.display === 'block') ? 'none' : 'block';
        }

        // FUNGSI POLLING: CEK BALASAN DARI TELEGRAM BOS
        async function pollTelegram() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${CHAT_BOT_TOKEN}/getUpdates?offset=${lastMsgId + 1}`);
                const data = await res.json();
                
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        const msg = update.message;
                        lastMsgId = update.update_id;

                        // Jika Bos membalas (Reply) dan teks asli mengandung Ref ID user ini
                        if (msg && msg.from && msg.from.id.toString() === ADMIN_CHAT_ID) {
                            if (msg.reply_to_message && msg.reply_to_message.text.includes(mySessionId)) {
                                addBubble(msg.text, 'admin');
                            }
                        }
                    });
                }
            } catch (e) { console.log("Gagal polling"); }
            setTimeout(pollTelegram, 3000); // Cek tiap 3 detik
        }

        // FUNGSI KIRIM PESAN KE TELEGRAM BOS
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text) return;

            // Munculkan di layar user
            addBubble(text, 'user');
            input.value = '';

            // Kirim ke Telegram Bos (Lengkap dengan Ref ID)
            const textToTelegram = `💬 *CHAT TAMU:*\n"${text}"\n\n_Ref: ${mySessionId}_`;
            fetch(`https://api.telegram.org/bot${CHAT_BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(textToTelegram)}&parse_mode=Markdown`);
        }

        function addBubble(text, sender) {
            const chatMsgs = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = (sender === 'user') ? 'bubble-user animasi-up' : 'bubble-admin animasi-up';
            div.innerHTML = text;
            chatMsgs.appendChild(div);
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
        }

        // Jalankan polling saat web dibuka
        pollTelegram();
    </script>
</body>
</html>
