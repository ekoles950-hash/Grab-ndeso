<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Payment Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .input-mewah { border: 2px solid #F3F4F6; transition: 0.3s; }
        .input-mewah:focus { border-color: #10B981; outline: none; }
        .metode-card { border: 2px solid #F3F4F6; cursor: pointer; transition: 0.3s; }
        .metode-card.active { border-color: #10B981; background: #ECFDF5; }
    </style>
</head>
<body class="bg-[#F9FAFB] pb-32">

    <nav class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white shadow-lg">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter">GRAB<span class="text-green-600 italic">NDESO</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-extrabold text-green-600 border-2 border-green-600 px-4 py-2 rounded-full uppercase">Lacak</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5 text-left">
        <div id="daftar-menu" class="grid grid-cols-2 gap-4 text-left"></div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] p-8 text-left overflow-y-auto max-h-[90vh]">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-black text-gray-800 mb-6 text-center">Detail Pembayaran</h3>
            
            <div class="space-y-4">
                <input type="text" id="f-nama" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Nama Lengkap">
                <input type="number" id="f-wa" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="WhatsApp">
                <textarea id="f-alamat" oninput="cekAlamat()" rows="2" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                
                <p class="text-[10px] font-black text-gray-400 uppercase ml-2">Pilih Metode Bayar</p>
                <div class="grid grid-cols-2 gap-3">
                    <div id="btn-cod" onclick="pilihMetode('COD')" class="metode-card active p-4 rounded-2xl text-center">
                        <span class="text-xl">💵</span>
                        <p class="text-[10px] font-black mt-1">COD (CASH)</p>
                    </div>
                    <div id="btn-qris" onclick="pilihMetode('QRIS')" class="metode-card p-4 rounded-2xl text-center">
                        <span class="text-xl">📱</span>
                        <p class="text-[10px] font-black mt-1">TRANSFER/QRIS</p>
                    </div>
                </div>

                <div id="box-total" class="hidden bg-green-50 border-2 border-green-100 p-5 rounded-[2rem]">
                    <div class="flex justify-between items-center">
                        <p class="text-xs font-black text-gray-800 uppercase">Total + Ongkir</p>
                        <p id="txt-total-akhir" class="font-black text-green-600 text-xl tracking-tighter">Rp 0</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button onclick="tutupModal()" class="flex-1 py-4 text-gray-400 font-bold text-sm">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 hidden z-50">
        <div class="bg-[#1A1A1A] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto">
            <p id="total-harga-bar" class="font-extrabold text-lg ml-4">Rp 0</p>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4 rounded-2xl font-black text-xs uppercase">Bayar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];
        let metodeTerpilih = 'COD';
        const ONGKIR = 5000;

        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2rem] p-3 shadow-sm border border-gray-50 flex flex-col">
                            <img src="${item.foto_url}" class="w-full h-32 object-cover rounded-[1.5rem] mb-3">
                            <div class="flex-grow px-1">
                                <h3 class="font-bold text-[11px] text-gray-800 leading-tight">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-black text-xs mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button onclick="masukKeranjang('${item.nama_makanan}', ${item.harga})" class="w-full mt-3 bg-gray-50 text-gray-800 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">+ Tambah</button>
                        </div>`;
                });
            }
        }

        function masukKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            document.getElementById('cart-bar').classList.remove('hidden');
            const totalProduk = keranjang.reduce((s, i) => s + i.harga, 0);
            document.getElementById('total-harga-bar').innerText = `Rp ${totalProduk.toLocaleString('id-ID')}`;
        }

        function pilihMetode(m) {
            metodeTerpilih = m;
            document.getElementById('btn-cod').classList.toggle('active', m === 'COD');
            document.getElementById('btn-qris').classList.toggle('active', m === 'QRIS');
        }

        function cekAlamat() {
            const boxTotal = document.getElementById('box-total');
            const totalMakan = keranjang.reduce((s, i) => s + i.harga, 0);
            boxTotal.classList.remove('hidden');
            document.getElementById('txt-total-akhir').innerText = `Rp ${(totalMakan + ONGKIR).toLocaleString('id-ID')}`;
        }

        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function kirimOrderan() {
            const nama = document.getElementById('f-nama').value;
            const wa = document.getElementById('f-wa').value;
            const alamat = document.getElementById('f-alamat').value;
            if (!nama || !alamat) return alert("Lengkapi data!");

            const totalMakan = keranjang.reduce((s, i) => s + i.harga, 0);
            const { data } = await sb.from('pesanan_ojek').insert([{ 
                nama_pembeli: nama, alamat_kirim: alamat, no_wa: wa, 
                status: 'pending', total_harga: totalMakan, metode_bayar: metodeTerpilih 
            }]).select();

            if (data) {
                tutupModal();
                tampilkanHalamanTracking(data[0].id, 'pending', totalMakan, metodeTerpilih);
                keranjang = []; 
            }
        }

        function tampilkanHalamanTracking(id, statusAwal, totalMakan, metode) {
            const totalBayar = totalMakan + ONGKIR;
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-4 bg-white p-8 rounded-[3rem] shadow-2xl text-center border border-gray-50">
                    <h3 id="txt-status" class="text-2xl font-black text-gray-800 uppercase italic">${statusAwal}</h3>
                    <div class="relative h-1 bg-gray-100 rounded-full mb-10 mt-12">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                        <div id="motor" class="absolute -top-10 text-4xl transition-all duration-700" style="left:0%">🛵</div>
                    </div>
                    
                    <div class="bg-gray-50 rounded-3xl p-5 mb-6 border border-dashed border-gray-200 text-left">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-black text-gray-800 uppercase">Total Tagihan</span>
                            <span class="text-xl font-black text-green-600 tracking-tighter">Rp ${totalBayar.toLocaleString('id-ID')}</span>
                        </div>
                        <p class="text-[9px] font-bold text-gray-400 mt-1 uppercase">Metode: ${metode}</p>
                    </div>

                    ${metode === 'QRIS' ? `
                        <button onclick="alert('Buka Gambar QRIS Bos!')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] mb-3 shadow-lg">TAMPILKAN QRIS PEMBAYARAN</button>
                    ` : ''}
                    
                    <button onclick="window.location.reload()" class="bg-[#1A1A1A] text-white w-full py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl">Kembali</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);
            sb.channel('track-' + id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, (p) => { geserMotor(p.new.status); }).subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            if (!m) return;
            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; }
        }

        function tanyaStatus() {
            const n = prompt("Cek Nama:");
            if (n) {
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => {
                    if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status, data[0].total_harga || 0, data[0].metode_bayar || 'COD');
                    else alert("Gak ada!");
                });
            }
        }
        loadMenu();
    </script>
</body>
</html>
