<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Dark Mode Exclusive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #0F172A; color: white; text-align: left; }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Style Chat Gelembung Premium */
        .bubble-driver { background: #1E293B; color: #E2E8F0; border-radius: 20px 20px 20px 4px; border: 1px solid #334155; }
        .bubble-user { background: #10B981; color: white; border-radius: 20px 20px 4px 20px; align-self: flex-end; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        
        /* Modal Chat Animasi */
        #live-chat-modal { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); opacity: 0; pointer-events: none; }
        #live-chat-modal.active { transform: translateY(0); opacity: 1; pointer-events: auto; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-40">

    <nav class="bg-[#0F172A]/80 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white text-xl">🛵</div>
            <h1 class="text-xl font-extrabold tracking-tighter uppercase italic">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
        <div class="flex gap-2">
             <button onclick="tanyaStatus()" class="text-[10px] font-black text-green-500 border border-green-500/30 px-4 py-2 rounded-full uppercase tracking-tighter active:scale-90 transition">Lacak</button>
        </div>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5 animasi-up">
        <div class="mb-8 mt-2 px-1">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Halo Juragan, Selamat Makan!</p>
            <h2 class="text-4xl font-black text-white tracking-tighter leading-tight mt-2 uppercase italic">
                Menu <span class="text-green-600">Andalan</span> Mageran
            </h2>
        </div>

        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
             </div>
    </div>

    <div id="halaman-lacak" class="hidden max-w-md mx-auto p-5 animasi-up">
        <div class="bg-[#1E293B] p-10 rounded-[3rem] shadow-2xl border border-white/5 text-center">
            <h3 id="txt-status" class="text-2xl font-black text-green-500 uppercase italic tracking-tighter">MENUNGGU...</h3>
            <div class="relative h-1.5 bg-gray-800 rounded-full my-16 mx-2">
                <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(16,185,129,0.5)]" style="width:10%"></div>
                <div id="motor" class="absolute -top-10 text-5xl transition-all duration-1000" style="left:0%; transform: translateX(-50%);">🛵</div>
            </div>
            <button onclick="tutupLacak()" class="w-full bg-white/5 text-gray-400 py-5 rounded-3xl font-black text-xs uppercase tracking-widest border border-white/5 active:scale-95 transition">Kembali</button>
        </div>
    </div>

    <div id="live-chat-modal" class="fixed inset-x-0 bottom-0 z-[150] flex justify-center p-4">
        <div class="bg-[#1E293B] w-full max-w-md rounded-[2.5rem] shadow-[0_-20px_50px_rgba(0,0,0,0.5)] border border-white/5 overflow-hidden flex flex-col h-[75vh]">
            <div class="bg-green-600 p-6 flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-white/20 rounded-full flex items-center justify-center text-2xl">💬</div>
                    <div class="text-left">
                        <h4 class="text-white font-black text-sm leading-none uppercase tracking-tighter">Live Chat Driver</h4>
                        <p id="txt-ref-id" class="text-green-100 text-[9px] mt-1 font-bold opacity-80 uppercase italic">Ref: -</p>
                    </div>
                </div>
                <button onclick="toggleChat()" class="text-white bg-black/20 w-10 h-10 rounded-full flex items-center justify-center font-bold active:scale-90 transition">✕</button>
            </div>

            <div id="box-chat" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 bg-[#0F172A]">
                <div class="bubble-driver p-4 text-[11px] font-bold shadow-md max-w-[85%] leading-relaxed text-left">
                    Halo Lur! Ada yang bisa kami bantu? Ketik pesan sampeyan dibawah ya, admin bakal langsung bales..
                </div>
            </div>

            <div class="p-5 bg-[#1E293B] border-t border-white/5 flex gap-3">
                <input type="text" id="input-pesan" onkeypress="if(event.key==='Enter') kirimChat()" class="flex-1 p-4 bg-[#0F172A] text-white rounded-2xl outline-none text-sm font-bold border border-white/5 focus:border-green-600 transition-all" placeholder="Tanya admin...">
                <button onclick="kirimChat()" class="bg-green-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-green-900/20 active:scale-90 transition">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#1E293B]/90 backdrop-blur-xl border-t border-white/5 p-3 flex justify-around items-center z-[100] max-w-md mx-auto rounded-t-[2.5rem] shadow-2xl">
        <button onclick="tanyaStatus()" class="flex flex-col items-center gap-1 group">
            <span class="text-xl group-active:scale-75 transition">🔍</span>
            <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Lacak</span>
        </button>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 group">
            <div class="bg-green-600 p-3.5 rounded-2xl shadow-xl shadow-green-900/20 -mt-10 border-4 border-[#0F172A]">
                <span class="text-2xl">🏠</span>
            </div>
            <span class="text-[9px] font-black text-green-500 uppercase tracking-widest">Beranda</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1 group relative">
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-[#1E293B] animate-pulse"></div>
            <span class="text-xl group-active:scale-75 transition">💬</span>
            <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Chat</span>
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TELE_TOKEN = '8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM';
        const TELE_CHATID = '7933777456';
        let lastUpdateId = 0;

        // Generate Session ID Unik
        let mySessionId = localStorage.getItem('chatSessionId');
        if (!mySessionId) {
            mySessionId = "GN-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            localStorage.setItem('chatSessionId', mySessionId);
        }

        // Buka/Tutup Chat
        function toggleChat() {
            const m = document.getElementById('live-chat-modal');
            document.getElementById('txt-ref-id').innerText = "Ref: " + mySessionId;
            m.classList.toggle('active');
        }

        // --- FUNGSI KIRIM CHAT ---
        async function kirimChat() {
            const inp = document.getElementById('input-pesan');
            const pesan = inp.value.trim();
            if(!pesan) return;

            addBubble(pesan, 'user');
            inp.value = '';

            // Notif ke Telegram Bos (Lengkap dengan Ref ID buat Bos bales)
            const teks = `💬 *CHAT GRABNDESO* \n👤 *Tamu:* "${pesan}"\n🆔 *Ref:* ${mySessionId}`;
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(teks)}&parse_mode=Markdown`);
        }

        // --- FUNGSI POLLING (Dengerin Balasan Bos dari Telegram) ---
        async function pollTelegram() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        const msg = update.message;
                        // Jika Bos me-Reply pesan yang ada Ref ID user ini
                        if (msg && msg.reply_to_message && msg.reply_to_message.text.includes(mySessionId)) {
                            addBubble(msg.text, 'driver');
                        }
                    });
                }
            } catch (e) { console.log("Polling..."); }
            setTimeout(pollTelegram, 3000);
        }

        function addBubble(teks, sender) {
            const box = document.getElementById('box-chat');
            const div = document.createElement('div');
            div.className = (sender === 'user') ? 'bubble-user p-4 text-[11px] font-bold shadow-md max-w-[85%] animasi-up' : 'bubble-driver p-4 text-[11px] font-bold shadow-md max-w-[85%] animasi-up';
            div.innerHTML = teks;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- FITUR MENU & LACAK ---
        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-[#1E293B] rounded-[2.5rem] p-3 border border-white/5 flex flex-col text-left">
                            <img src="${item.foto_url}" class="w-full h-36 object-cover rounded-[2rem] mb-4">
                            <div class="flex-grow px-3">
                                <h3 class="font-bold text-[11px] text-white leading-tight uppercase tracking-tighter">${item.nama_makanan}</h3>
                                <p class="text-green-500 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button onclick="orderViaWA('${item.nama_makanan}')" class="w-full bg-white/5 hover:bg-green-600 text-white py-4 rounded-[1.5rem] text-[9px] font-black uppercase mt-5 transition-all border border-white/5">Beli</button>
                        </div>`;
                });
            }
        }

        function orderViaWA(menu) {
            const nama = prompt("Nama Sampeyan:");
            if(!nama) return;
            const teksOrder = `🚨 *ORDER BARU (WEB)* \n👤 Nama: ${nama}\n🍱 Menu: ${menu}\n🆔 Ref: ${mySessionId}`;
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(teksOrder)}&parse_mode=Markdown`);
            alert("Orderan dikirim ke dapur! Cek status di menu LACAK ya.");
        }

        function tanyaStatus() {
            const nama = prompt("Cek Status (Ketik Nama):");
            if(nama) {
                document.getElementById('konten-utama').classList.add('hidden');
                document.getElementById('halaman-lacak').classList.remove('hidden');
                // Realtime Tracking Logika Bos yg lama bisa ditaruh sini
                geserMotor('pending'); 
            }
        }

        function tutupLacak() {
            document.getElementById('konten-utama').classList.remove('hidden');
            document.getElementById('halaman-lacak').classList.add('hidden');
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor'), b = document.getElementById('bar-progress'), t = document.getElementById('txt-status');
            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; m.innerHTML = "🛵"; }
            if(stat === 'proses') { m.style.left = '45%'; b.style.width = '50%'; m.innerHTML = "👨‍🍳"; }
            if(stat === 'dikirim') { m.style.left = '90%'; b.style.width = '100%'; m.innerHTML = "🏍️💨"; }
        }

        loadMenu();
        pollTelegram();
    </script>
</body>
</html>
