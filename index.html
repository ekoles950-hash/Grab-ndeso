<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Pesan Antar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <nav class="bg-green-600 p-4 text-white sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold italic text-white">🛵 GRAB NDESO</h1>
        <button onclick="tanyaStatus()" class="text-[10px] bg-white text-green-600 px-4 py-2 rounded-full font-bold shadow active:scale-90 transition">CEK PESANAN</button>
    </nav>

    <div id="konten-utama" class="container mx-auto p-4 max-w-md">
        <div class="bg-white border border-green-100 p-4 mb-6 rounded-2xl shadow-sm flex items-center">
            <div class="bg-green-100 p-3 rounded-full mr-4 text-2xl">⚡</div>
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Sistem Online</p>
                <p class="text-sm font-bold text-gray-700">Driver siap meluncur ke RT/RW kamu!</p>
            </div>
        </div>

        <h2 class="font-bold text-gray-700 mb-4 ml-1 flex items-center">🍴 Menu Lezat Hari Ini:</h2>
        
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="bg-gray-200 animate-pulse h-48 rounded-2xl"></div>
            <div class="bg-gray-200 animate-pulse h-48 rounded-2xl"></div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-5 shadow-[0_-10px_25px_rgba(0,0,0,0.1)] hidden z-50 rounded-t-[2.5rem] border-t border-gray-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="flex flex-col">
                <span id="total-item" class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">0 Item</span>
                <span id="total-harga" class="font-black text-green-600 text-xl tracking-tight">Rp 0</span>
            </div>
            <button id="btn-bayar" onclick="prosesCheckout()" class="bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-2xl font-black text-sm shadow-lg shadow-green-200 active:scale-95 transition-all">
                BAYAR SEKARANG
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];

        // 1. Loading Menu
        async function loadMenu() {
            const container = document.getElementById('daftar-menu');
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col p-2">
                            <img src="${item.foto_url || 'https://via.placeholder.com/300'}" class="w-full h-32 object-cover rounded-2xl mb-2">
                            <div class="p-1 flex flex-col justify-between flex-grow">
                                <h3 class="font-bold text-xs text-gray-800 leading-tight mb-1">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-black text-sm">Rp ${item.harga.toLocaleString('id-ID')}</p>
                                <button onclick="masukKeranjang('${item.nama_makanan}', ${item.harga})" 
                                    class="w-full mt-3 bg-gray-50 text-green-600 border border-green-100 py-2 rounded-xl text-[10px] font-black active:bg-green-600 active:text-white transition">
                                    + KERANJANG
                                </button>
                            </div>
                        </div>`;
                });
            }
        }

        function masukKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            const bar = document.getElementById('cart-bar');
            bar.classList.remove('hidden');
            const total = keranjang.reduce((s, i) => s + i.harga, 0);
            document.getElementById('total-harga').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('total-item').innerText = `${keranjang.length} ITEM TERPILIH`;
        }

        // 2. Fungsi Checkout (Fix: Langsung Pindah Halaman)
        async function prosesCheckout() {
            const nama = prompt("Siapa Nama Pembeli?");
            if (!nama) return;
            const alamat = prompt("Alamat Kirim (RT/RW/No Rumah):");
            if (!alamat) return;

            const total = keranjang.reduce((s, i) => s + i.harga, 0);
            const detail = keranjang.map(i => i.nama).join(", ");

            const { data, error } = await sb
                .from('pesanan_ojek')
                .insert([{ nama_pembeli: nama, alamat_kirim: alamat, status: 'pending' }])
                .select();

            if (data && data.length > 0) {
                keranjang = []; // Kosongkan keranjang
                tampilkanHalamanTracking(data[0].id, 'pending');
            } else {
                alert("Gagal kirim pesanan, Bos!");
            }
        }

        // 3. Tracking Page
        function tampilkanHalamanTracking(id, statusAwal) {
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-8 bg-white p-8 rounded-[2rem] shadow-xl text-center border border-green-50">
                    <div class="flex justify-center mb-6">
                        <span class="bg-green-100 text-green-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">Oder ID: ${id.slice(0,8)}</span>
                    </div>
                    <div class="relative h-2 bg-gray-100 rounded-full mb-14 mt-16 mx-4">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-1000" style="width:10%"></div>
                        <div id="motor" class="absolute -top-12 text-5xl transition-all duration-1000" style="left:0%">🛵</div>
                    </div>
                    <h3 id="txt-status" class="text-2xl font-black text-gray-800 uppercase tracking-tighter">${statusAwal}</h3>
                    <p id="txt-desc" class="text-sm text-gray-400 mt-2 font-medium px-6">Pesananmu sudah masuk ke sistem ojek nampol.</p>
                    <button onclick="window.location.reload()" class="mt-12 text-[10px] text-gray-300 font-bold hover:text-green-600 transition tracking-widest">← KEMBALI KE MENU</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);

            // Pantau Realtime
            sb.channel('track-' + id)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, 
                (p) => { geserMotor(p.new.status); })
                .subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            const d = document.getElementById('txt-desc');
            if (!m) return;

            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; d.innerText = "Lagi nunggu driver ambil orderan."; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; t.style.color = '#EAB308'; d.innerText = "Pesanan lagi disiapin warung."; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; t.style.color = '#2563EB'; m.innerHTML = "🏍️💨"; d.innerText = "Driver lagi gas pol ke rumahmu!"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; t.style.color = '#16A34A'; m.innerHTML = "🏠"; d.innerText = "Alhamdulillah sampai! Jangan lupa bayar ya lur."; }
        }

        function tanyaStatus() {
            const n = prompt("Siapa namamu pas pesen tadi?");
            if (n) {
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => {
                    if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status);
                    else alert("Gak ada pesanan atas nama itu!");
                });
            }
        }

        loadMenu();
    </script>
</body>
</html>
