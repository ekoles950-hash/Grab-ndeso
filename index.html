<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Grab Ndeso - Exclusive Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #0F172A; color: white; text-align: left; }
        .input-dark { background-color: #1E293B; border: 1px solid #334155; color: white; transition: 0.3s; }
        .input-dark:focus { border-color: #10B981; outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .metode-card { background: #1E293B; border: 2px solid #334155; cursor: pointer; transition: 0.3s; text-align: center; color: #94A3B8; }
        .metode-card.active { border-color: #10B981; background: #064E3B; color: white; }
        .animasi-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* HEADER STYLE */
        header { background: #0F172A; padding: 20px 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* BANNER SLIDER FIXED */
        #slider-container { width: 100%; overflow: hidden; border-radius: 2.5rem; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #slider { display: flex; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-img { width: 100%; flex-shrink: 0; aspect-ratio: 16 / 9; object-fit: cover; }

        /* CHAT PREMIUM */
        #chatWidget { display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; max-width: 360px; background: #1E293B; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid #334155; }
        .chat-header { background: #10B981; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 350px; overflow-y: auto; padding: 20px; background: #0F172A; display: flex; flex-direction: column; gap: 12px; }
        .bubble-admin { background: #334155; color: white; padding: 12px 16px; border-radius: 20px 20px 20px 5px; font-size: 11px; align-self: flex-start; border: 1px solid #475569; }
        .bubble-user { background: #10B981; color: white; padding: 12px 16px; border-radius: 20px 20px 5px 20px; font-size: 11px; align-self: flex-end; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        
        .nav-bawah { background: #1E293B; border-top: 1px solid #334155; box-shadow: 0 -10px 25px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <header>
        <h1 class="text-3xl font-black tracking-[0.3em] uppercase italic text-white">
            GRAB<span class="text-green-500">NDESO</span>
        </h1>
    </header>

    <div id="konten-utama" class="max-w-md mx-auto p-5 animasi-up">
        
        <div id="slider-container" class="mb-8">
            <div id="slider">
                <img src="https://raw.githubusercontent.com/ekoles950-hash/Grab-ndeso/main/promo1.jpg" class="slide-img" alt="Banner 1">
                <img src="https://raw.githubusercontent.com/ekoles950-hash/Grab-ndeso/main/promo2.jpg" class="slide-img" alt="Banner 2">
            </div>
            <div class="flex justify-center gap-2 py-3 bg-[#1E293B]">
                <div id="dot0" class="w-8 h-1.5 rounded-full bg-green-500 transition-all"></div>
                <div id="dot1" class="w-2 h-1.5 rounded-full bg-white/20 transition-all"></div>
            </div>
        </div>

        <div class="mb-8 px-1">
            <p id="sapaan-pagi" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">
                Halo, Selamat <span id="waktu-hari">...</span>!
            </p>
            <h2 class="text-4xl font-black text-white tracking-tighter leading-tight mt-1 uppercase italic">
                Mau Makan <span class="text-green-600">Apa?</span>
            </h2>
            <p class="text-xs text-gray-400 mt-2 italic">Mager? Tenang ojek kami siap anter sat-set.</p>
        </div>

        <div id="daftar-menu" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/80 z-[110] hidden flex items-end justify-center">
        <div class="bg-[#1E293B] w-full max-w-md rounded-t-[3rem] text-left border-t border-white/10 animasi-up flex flex-col" style="max-height: 92vh;">
            <div class="p-6 pb-2 flex justify-between items-center">
                <h3 class="text-2xl font-black text-white tracking-tighter uppercase italic">Data Antar</h3>
                <button onclick="tutupModal()" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-white text-xl active:scale-90 transition">✕</button>
            </div>
            <div class="p-6 space-y-5 overflow-y-auto flex-1">
                <input type="text" id="f-nama" class="w-full p-4 rounded-2xl input-dark text-sm font-bold" placeholder="Nama Penerima">
                <input type="number" id="f-wa" class="w-full p-4 rounded-2xl input-dark text-sm font-bold" placeholder="WhatsApp">
                <textarea id="f-alamat" oninput="cekAlamat()" rows="2" class="w-full p-4 rounded-2xl input-dark text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <div id="btn-cod" onclick="pilihMetode('COD')" class="metode-card active p-4 rounded-2xl shadow-sm"><span class="text-xl">💵</span><p class="text-[9px] font-black mt-1 uppercase">COD (TUNAI)</p></div>
                    <div id="btn-qris" onclick="pilihMetode('QRIS')" class="metode-card p-4 rounded-2xl shadow-sm"><span class="text-xl">📱</span><p class="text-[9px] font-black mt-1 uppercase">QRIS/TRANSFER</p></div>
                </div>
                <div id="box-total" class="hidden bg-[#064E3B]/30 border-2 border-green-900/50 p-5 rounded-[2rem] mt-2">
                    <div class="flex justify-between items-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Ongkir Flat</p><p class="text-[10px] font-bold text-slate-400">Rp 5.000</p></div>
                    <div class="flex justify-between items-center border-t border-green-900/50 mt-2 pt-2"><p class="text-xs font-black text-white uppercase tracking-widest">Total Bayar</p><p id="txt-total-akhir" class="font-black text-green-500 text-2xl tracking-tighter text-left">Rp 0</p></div>
                </div>
            </div>
            <div class="p-6 bg-[#1E293B] border-t border-white/5">
                <button onclick="kirimOrderan()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-sm active:scale-95 transition tracking-widest uppercase italic">PESAN SEKARANG <i class="fa-solid fa-paper-plane ml-2"></i></button>
            </div>
        </div>
    </div>

    <div id="modal-qris" class="fixed inset-0 bg-black/90 z-[120] hidden flex items-center justify-center p-6 text-center" onclick="tutupQRIS()">
        <div class="bg-white p-4 rounded-3xl max-w-sm w-full relative" onclick="event.stopPropagation()">
            <img src="QRIS.jpg" class="w-full rounded-2xl border border-gray-100 mb-4" alt="QRIS">
            <button onclick="tutupQRIS()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-black text-xs uppercase">Tutup</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-3 flex justify-around items-center z-[100] nav-bawah max-w-md mx-auto rounded-t-[2.5rem]">
        <button onclick="tanyaStatus()" class="flex flex-col items-center gap-1 group"><span class="text-xl group-active:scale-75 transition">🔍</span><span class="text-[9px] font-black text-slate-500 uppercase">Lacak</span></button>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 group"><div class="bg-green-600 p-3.5 rounded-2xl shadow-xl -mt-10 border-4 border-[#0F172A]"><span class="text-2xl">🏠</span></div><span class="text-[9px] font-black text-green-500 uppercase tracking-widest">Beranda</span></button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1 group relative"><div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-[#1E293B] animate-pulse"></div><span class="text-xl group-active:scale-75 transition">💬</span><span class="text-[9px] font-black text-slate-500 uppercase uppercase">Chat</span></button>
    </div>

    <div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-50 animasi-up">
        <div class="bg-[#1E293B] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto border border-white/5">
            <div class="flex items-center gap-4 text-left"><div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-xl shadow-lg">🛒</div><p id="total-harga-bar" class="font-black text-2xl">Rp 0</p></div>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4.5 rounded-2xl font-black text-[10px] uppercase">Checkout</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TELE_TOKEN = '8514459117:AAH3kJ4MLDwnhykBMTSCLKatglFudZfm_dM';
        const TELE_CHATID = '7933777456';
        let keranjang = {}, metodeBayar = 'COD', lastMsgId = 0, currentSlide = 0;
        const ONGKIR = 5000;

        let mySessionId = localStorage.getItem('chatSessionId');
        if (!mySessionId) { mySessionId = "GN-" + Math.random().toString(36).substr(2, 5).toUpperCase(); localStorage.setItem('chatSessionId', mySessionId); }

        function setSapaan() { const h = new Date().getHours(); let s = "Pagi"; if(h>=11 && h<15) s="Siang"; else if(h>=15 && h<18) s="Sore"; else if(h>=18 || h<4) s="Malam"; if(document.getElementById('waktu-hari')) document.getElementById('waktu-hari').innerText = s; }

        function moveSlide() {
            currentSlide = (currentSlide + 1) % 2;
            const slider = document.getElementById('slider');
            if(slider) {
                slider.style.transform = `translateX(-${currentSlide * 100}%)`;
                document.getElementById('dot0').className = currentSlide === 0 ? "w-8 h-1.5 rounded-full bg-green-500 transition-all" : "w-2 h-1.5 rounded-full bg-white/20 transition-all";
                document.getElementById('dot1').className = currentSlide === 1 ? "w-8 h-1.5 rounded-full bg-green-500 transition-all" : "w-2 h-1.5 rounded-full bg-white/20 transition-all";
            }
        }
        setInterval(moveSlide, 5000);

        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data && container) { container.innerHTML = ''; data.forEach(item => { container.innerHTML += `<div class="bg-[#1E293B] rounded-[2.5rem] p-3 border border-white/5 flex flex-col text-left"><img src="${item.foto_url}" class="w-full h-36 object-cover rounded-[2rem] mb-4"><div class="flex-grow px-3 text-left"><h3 class="font-bold text-[10px] text-white leading-tight uppercase text-left">${item.nama_makanan}</h3><p class="text-green-500 font-black text-sm mt-1 text-left">Rp ${item.harga.toLocaleString('id-ID')}</p></div><button id="btn-beli-${item.id}" onclick="showQtyControl('${item.id}', '${item.nama_makanan}', ${item.harga})" class="w-full bg-white/5 text-white py-4 rounded-[1.5rem] text-[9px] font-black uppercase mt-5 border border-white/5 transition active:bg-green-600">Beli</button><div id="qty-control-${item.id}" class="hidden flex items-center justify-between bg-[#0F172A] rounded-3xl p-1.5 mt-5 text-center"><button onclick="kurangItem('${item.id}')" class="w-10 h-10 bg-[#1E293B] text-white rounded-2xl font-bold text-center">-</button><span id="qty-${item.id}" class="font-black text-sm text-white">0</span><button onclick="tambahItem('${item.id}', '${item.nama_makanan}', ${item.harga})" class="w-10 h-10 bg-green-600 text-white rounded-2xl font-bold text-center">+</button></div></div>`; }); }
        }

        function showQtyControl(id, n, h) { document.getElementById(`btn-beli-${id}`).classList.add('hidden'); document.getElementById(`qty-control-${id}`).classList.remove('hidden'); tambahItem(id, n, h); }
        function tambahItem(id, n, h) { if (!keranjang[id]) keranjang[id] = { nama: n, harga: h, qty: 1 }; else keranjang[id].qty += 1; updateTampilan(id); }
        function kurangItem(id) { if (keranjang[id]) { keranjang[id].qty -= 1; if (keranjang[id].qty <= 0) { delete keranjang[id]; document.getElementById(`qty-control-${id}`).classList.add('hidden'); document.getElementById(`btn-beli-${id}`).classList.remove('hidden'); } } updateTampilan(id); }
        function updateTampilan(id) { const q = document.getElementById(`qty-${id}`); if (q) q.innerText = keranjang[id] ? keranjang[id].qty : 0; let t = 0; for (let k in keranjang) t += keranjang[k].harga * keranjang[k].qty; const cb = document.getElementById('cart-bar'); if (t > 0) { cb.classList.remove('hidden'); document.getElementById('total-harga-bar').innerText = `Rp ${t.toLocaleString('id-ID')}`; } else cb.classList.add('hidden'); }
        function pilihMetode(m) { metodeBayar = m; document.getElementById('btn-cod').classList.toggle('active', m === 'COD'); document.getElementById('btn-qris').classList.toggle('active', m === 'QRIS'); }
        function cekAlamat() { let t = 0; for (let k in keranjang) t += keranjang[k].harga * keranjang[k].qty; if (document.getElementById('f-alamat').value.length > 2) { document.getElementById('box-total').classList.remove('hidden'); document.getElementById('txt-total-akhir').innerText = `Rp ${(t + ONGKIR).toLocaleString('id-ID')}`; } }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupQRIS() { document.getElementById('modal-qris').classList.add('hidden'); }
        
        async function kirimOrderan() { 
            const n = document.getElementById('f-nama').value, a = document.getElementById('f-alamat').value, w = document.getElementById('f-wa').value; 
            if (!n || !a) return alert("Isi Nama & Alamat dulu!"); 
            let tm = 0, lm = []; for (let k in keranjang) { tm += keranjang[k].harga * keranjang[k].qty; lm.push(`${keranjang[k].nama} (x${keranjang[k].qty})`); } 
            const { data } = await sb.from('pesanan_ojek').insert([{ nama_pembeli: n, alamat_kirim: a + " [" + lm.join(", ") + "]", no_wa: w, status: 'pending', total_harga: tm, metode_bayar: metodeBayar }]).select(); 
            if (data) { 
                const pt = `🚨 *ORDER BARU* \n👤 Nama: ${n}\n📍 Alamat: ${a}\n📞 WA: ${w}\n🍱 Menu: ${lm.join(", ")}\n💰 Total: Rp ${(tm + ONGKIR).toLocaleString('id-ID')}\n🆔 Ref: ${mySessionId}`; 
                fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(pt)}&parse_mode=Markdown`); 
                location.reload(); 
            } 
        }

        function tanyaStatus() { const n = prompt("Ketik Nama:"); if (n) { sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1).then(({data}) => { if (data && data.length > 0) alert("Status: " + data[0].status); else alert("Gak ada pesanan!"); }); } }
        
        setSapaan(); loadMenu();
    </script>
</body>
</html>
