<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .input-mewah { border: 2px solid #F3F4F6; transition: all 0.3s; }
        .input-mewah:focus { border-color: #10B981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); outline: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animasi-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#F9FAFB] pb-32">

    <nav class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2 rounded-xl text-white shadow-lg shadow-green-200">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter">GRAB<span class="text-green-600 italic">NDESO</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-extrabold text-green-600 border-2 border-green-600 px-4 py-2 rounded-full uppercase tracking-tighter">Lacak Pesanan</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5">
        <h2 class="text-xl font-extrabold text-gray-800 mb-6 flex items-center gap-2">Menu Hari Ini</h2>
        <div id="daftar-menu" class="grid grid-cols-2 gap-4">
            <div class="bg-white h-52 rounded-[2rem] animate-pulse"></div>
            <div class="bg-white h-52 rounded-[2rem] animate-pulse"></div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] p-8 animasi-up">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-extrabold text-gray-800 mb-2 text-center">Detail Pengiriman</h3>
            <p class="text-xs text-gray-400 text-center mb-8 font-semibold">Cek kembali pesanan anda</p>
            
            <div class="space-y-4">
                <input type="text" id="f-nama" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Nama Lengkap">
                <input type="number" id="f-wa" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="WhatsApp (0812...)">
                <textarea id="f-alamat" rows="2" class="w-full p-4 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                
                <div class="bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl space-y-2">
                    <div class="flex justify-between items-center">
                        <p class="text-[10px] font-extrabold text-gray-400 uppercase">Ongkos Kirim</p>
                        <p class="font-bold text-green-600 text-sm">Rp 5.000</p>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-gray-200">
                        <p class="text-xs font-black text-gray-800 uppercase">Total Bayar</p>
                        <p id="modal-total-akhir" class="font-black text-green-600 text-lg">Rp 0</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button onclick="tutupModal()" class="flex-1 py-4 text-gray-400 font-bold text-sm">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-green-200 transition active:scale-95">KONFIRMASI PESANAN</button>
            </div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 hidden z-50">
        <div class="bg-[#1A1A1A] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-green-900">🛒</div>
                <div>
                    <p id="total-harga-display" class="font-extrabold text-lg leading-none text-white text-xl">Rp 0</p>
                    <p class="text-[9px] text-gray-400 font-bold uppercase mt-1 tracking-widest">Total Belanja</p>
                </div>
            </div>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4 rounded-2xl font-black text-xs active:scale-95 transition-all uppercase tracking-tighter shadow-md">Bayar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let keranjang = [];
        const ONGKIR = 5000;

        async function loadMenu() {
            const container = document.getElementById('daftar-menu');
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2.5rem] p-3 shadow-sm border border-gray-50 flex flex-col group">
                            <img src="${item.foto_url || 'https://via.placeholder.com/300'}" class="w-full h-36 object-cover rounded-[2rem] mb-3 transition duration-500">
                            <div class="flex-grow px-2">
                                <h3 class="font-bold text-xs text-gray-800 leading-tight">${item.nama_makanan}</h3>
                                <p class="text-green-600 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <button onclick="masukKeranjang('${item.nama_makanan}', ${item.harga})" 
                                class="w-full mt-4 bg-gray-50 text-gray-800 py-3 rounded-2xl text-[9px] font-black hover:bg-green-600 hover:text-white transition-all uppercase tracking-widest">
                                + Tambah
                            </button>
                        </div>`;
                });
            }
        }

        function masukKeranjang(nama, harga) {
            keranjang.push({ nama, harga });
            document.getElementById('cart-bar').classList.remove('hidden');
            
            const totalProduk = keranjang.reduce((s, i) => s + i.harga, 0);
            const totalAkhir = totalProduk + ONGKIR;

            // Di keranjang hitam, hanya harga makanan
            document.getElementById('total-harga-display').innerText = `Rp ${totalProduk.toLocaleString('id-ID')}`;
            
            // Di modal, baru muncul total + ongkir
            document.getElementById('modal-total-akhir').innerText = `Rp ${totalAkhir.toLocaleString('id-ID')}`;
        }

        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function kirimOrderan() {
            const nama = document.getElementById('f-nama').value;
            const wa = document.getElementById('f-wa').value;
            const alamat = document.getElementById('f-alamat').value;
            if (!nama || !wa || !alamat) return alert("Lengkapi data dulu Bos!");

            const totalMakan = keranjang.reduce((s, i) => s + i.harga, 0);

            const { data } = await sb.from('pesanan_ojek').insert([{ 
                nama_pembeli: nama, alamat_kirim: alamat, status: 'pending' 
            }]).select();

            if (data) {
                tutupModal();
                tampilkanHalamanTracking(data[0].id, 'pending', totalMakan);
                keranjang = []; 
            }
        }

        function tampilkanHalamanTracking(id, statusAwal, totalMakan) {
            const totalBayar = totalMakan + ONGKIR;
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-4 bg-white p-8 rounded-[3rem] shadow-2xl border border-gray-50">
                    <div class="text-center">
                        <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">🥡</div>
                        <h3 id="txt-status" class="text-2xl font-black text-gray-800 italic uppercase tracking-tighter">${statusAwal}</h3>
                        
                        <div class="relative h-1.5 bg-gray-100 rounded-full mb-10 mt-12 mx-4">
                            <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                            <div id="motor" class="absolute -top-10 text-4xl transition-all duration-700" style="left:0%">🛵</div>
                        </div>
                    </div>

                    <div class="bg-gray-50 rounded-3xl p-5 mb-8 border border-dashed border-gray-200">
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest">
                            <span>Makan</span>
                            <span class="text-gray-800 text-sm">Rp ${totalMakan.toLocaleString('id-ID')}</span>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-4 uppercase tracking-widest border-b border-gray-200 pb-2">
                            <span>Ongkir Flat</span>
                            <span class="text-green-600 text-sm">Rp 5.000</span>
                        </div>
                        <div class="flex justify-between items-center pt-2">
                            <span class="text-xs font-black text-gray-800 uppercase">Total Bayar</span>
                            <span class="text-2xl font-black text-green-600 tracking-tighter">Rp ${totalBayar.toLocaleString('id-ID')}</span>
                        </div>
                    </div>

                    <button onclick="window.location.reload()" class="bg-[#1A1A1A] text-white w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Kembali Belanja</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);

            sb.channel('track-' + id)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, 
                (p) => { geserMotor(p.new.status); })
                .subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            if (!m) return;
            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; }
        }

        function tanyaStatus() {
            const n = prompt("Masukkan Nama saat memesan:");
            if (n) {
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => {
                    if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status, 0);
                    else alert("Gak ketemu!");
                });
            }
        }

        loadMenu();
    </script>
</body>
</html>
