<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Driver - Grab Ndeso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; }
        .card-order { border-left: 6px solid #10B981; }
        .tab-active { border-bottom: 3px solid #10B981; color: #10B981; }
    </style>
</head>
<body class="pb-20">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-md text-center">
            <div class="bg-green-600 w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center text-3xl shadow-lg">🔑</div>
            <h2 class="text-2xl font-black text-gray-800 tracking-tighter uppercase italic">Akses Driver</h2>
            <p class="text-xs text-gray-500 mb-6 font-bold">Masukkan Password Rahasia</p>
            <input type="password" id="pass-admin" class="w-full p-4 rounded-2xl bg-gray-100 border-2 border-transparent focus:border-green-600 outline-none mb-4 text-center font-bold" placeholder="Password...">
            <button onclick="cekLogin()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition">MASUK PANEL</button>
        </div>
    </div>

    <nav class="bg-white p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <h1 class="text-lg font-black text-gray-800 italic uppercase">Panel<span class="text-green-600">Driver</span></h1>
        <button onclick="location.reload()" class="text-xs font-bold text-gray-400 bg-gray-100 px-4 py-2 rounded-full uppercase">Refresh</button>
    </nav>

    <div class="flex bg-white border-b border-gray-100 mb-4">
        <button id="tab-p" onclick="switchTab('pending')" class="flex-1 py-4 text-xs font-black uppercase tracking-widest tab-active">Baru (Pending)</button>
        <button id="tab-r" onclick="switchTab('proses')" class="flex-1 py-4 text-xs font-black uppercase tracking-widest text-gray-400">Proses (Jalan)</button>
    </div>

    <div id="list-orderan" class="p-4 space-y-4">
        <p class="text-center text-gray-400 text-xs py-10 font-bold">Menunggu orderan masuk...</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'pending';
        const PASS_RAHASIA = "driverndesogacor"; // <--- GANTI PASSWORD SESUKAMU BOS

        function cekLogin() {
            const input = document.getElementById('pass-admin').value;
            if(input === PASS_RAHASIA) {
                document.getElementById('login-screen').classList.add('hidden');
                loadOrders();
                subscribeChanges();
            } else {
                alert("Password Salah Bos!");
            }
        }

        async function loadOrders() {
            const container = document.getElementById('list-orderan');
            const { data, error } = await sb.from('pesanan_ojek')
                .select('*')
                .eq('status', currentTab)
                .order('created_at', { ascending: false });

            if (data && data.length > 0) {
                container.innerHTML = '';
                data.forEach(item => {
                    const btnAksi = currentTab === 'pending' 
                        ? `<button onclick="updateStatus('${item.id}', 'proses')" class="w-full bg-green-600 text-white py-3 rounded-xl font-black text-[10px] uppercase mt-4">AMBIL ORDERAN</button>`
                        : `<button onclick="updateStatus('${item.id}', 'selesai')" class="w-full bg-gray-800 text-white py-3 rounded-xl font-black text-[10px] uppercase mt-4">SELESAI / SAMPAI</button>`;

                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 card-order animasi-up">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <p class="text-[10px] font-black text-green-600 uppercase tracking-tighter">Nama Pembeli</p>
                                    <h4 class="text-lg font-black text-gray-800 leading-none capitalize">${item.nama_pembeli}</h4>
                                </div>
                                <span class="bg-gray-100 text-[9px] font-black px-3 py-1 rounded-full uppercase">${item.metode_bayar}</span>
                            </div>
                            <div class="space-y-2 mt-4">
                                <div class="flex gap-2">
                                    <span class="text-sm">📍</span>
                                    <p class="text-xs font-bold text-gray-600">${item.alamat_kirim}</p>
                                </div>
                                <div class="flex gap-2">
                                    <span class="text-sm">📞</span>
                                    <a href="https://wa.me/${item.no_wa}" class="text-xs font-black text-blue-600 underline">Chat WhatsApp</a>
                                </div>
                                <div class="flex gap-2">
                                    <span class="text-sm">💰</span>
                                    <p class="text-xs font-black text-gray-800 uppercase">Total: Rp ${item.total_harga?.toLocaleString('id-ID')}</p>
                                </div>
                            </div>
                            ${btnAksi}
                        </div>`;
                });
            } else {
                container.innerHTML = `<p class="text-center text-gray-400 text-xs py-10 font-bold uppercase tracking-widest">Kosong Bos...</p>`;
            }
        }

        async function updateStatus(id, statusBaru) {
            const { error } = await sb.from('pesanan_ojek').update({ status: statusBaru }).eq('id', id);
            if (!error) loadOrders();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-p').classList.toggle('tab-active', t === 'pending');
            document.getElementById('tab-p').classList.toggle('text-gray-400', t !== 'pending');
            document.getElementById('tab-r').classList.toggle('tab-active', t === 'proses');
            document.getElementById('tab-r').classList.toggle('text-gray-400', t !== 'proses');
            loadOrders();
        }

        function subscribeChanges() {
            sb.channel('db-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'pesanan_ojek' }, () => {
                loadOrders();
            }).subscribe();
        }
    </script>
</body>
</html>
