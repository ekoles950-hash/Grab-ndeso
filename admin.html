<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ndeso - Exclusive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; text-align: left; }
        .input-mewah { border: 2px solid #F3F4F6; transition: 0.3s; }
        .input-mewah:focus { border-color: #10B981; outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .animasi-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[#F9FAFB] pb-32 text-left">

    <nav class="bg-white/90 backdrop-blur p-4 sticky top-0 z-40 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-2.5 rounded-2xl text-white shadow-lg shadow-green-100 text-xl">🛵</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tighter uppercase italic">Grab<span class="text-green-600">Ndeso</span></h1>
        </div>
        <button onclick="tanyaStatus()" class="text-[10px] font-extrabold text-green-600 border-2 border-green-600 px-5 py-2.5 rounded-full uppercase tracking-widest">Lacak</button>
    </nav>

    <div id="konten-utama" class="max-w-md mx-auto p-5 text-left animasi-up">
        <div class="mb-8 mt-2 px-1 text-left">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Halo, Selamat <span id="waktu-hari">...</span>!</p>
            <h2 class="text-3xl font-black text-gray-800 tracking-tighter leading-none mt-1.5 uppercase italic">Mau Makan <span class="text-green-600">Apa</span> Hari Ini?</h2>
            <p class="text-xs text-gray-500 font-semibold mt-3 leading-relaxed">Pilih menu favoritmu di bawah. Mager? Tenang, ojek kami siap anter sat-set!</p>
        </div>
        <div id="daftar-menu" class="grid grid-cols-2 gap-4 text-left"></div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] p-8 text-left overflow-y-auto max-h-[95vh] animasi-up">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-black text-gray-800 mb-8 tracking-tighter">Data Antar</h3>
            <div class="space-y-4">
                <input type="text" id="f-nama" class="w-full p-4.5 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Nama Lengkap">
                <input type="number" id="f-wa" class="w-full p-4.5 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="WhatsApp (081xxx)">
                <textarea id="f-alamat" oninput="cekAlamat()" rows="2" class="w-full p-4.5 rounded-2xl bg-gray-50 input-mewah text-sm font-bold" placeholder="Alamat Lengkap"></textarea>
                <div id="box-total" class="hidden bg-green-50 border-2 border-green-100 p-6 rounded-[2rem]">
                    <div class="flex justify-between items-center border-t border-green-100 pt-3"><p class="text-xs font-black text-gray-800 uppercase tracking-wider">Total Bayar</p><p id="txt-total-akhir" class="font-black text-green-600 text-2xl tracking-tighter">Rp 0</p></div>
                </div>
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="tutupModal()" class="flex-1 py-4.5 text-gray-400 font-bold text-sm">Batal</button>
                <button onclick="kirimOrderan()" class="flex-[2.5] bg-green-600 text-white py-4.5 rounded-2xl font-black text-sm shadow-xl transition">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="modal-qris" class="fixed inset-0 bg-black/80 z-[80] hidden flex items-center justify-center p-6" onclick="tutupQRIS()">
        <div class="bg-white p-4 rounded-3xl max-w-sm w-full shadow-2xl relative" onclick="event.stopPropagation()">
            <img src="QRIS.jpg" class="w-full rounded-2xl shadow-inner border border-gray-100 mb-4" alt="QRIS">
            <button onclick="tutupQRIS()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 hidden z-50 animasi-up">
        <div class="bg-[#1A1A1A] text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center max-w-md mx-auto border border-white/10 overflow-hidden">
            <div class="flex items-center gap-4 relative z-10"><div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-xl shadow-lg">🛒</div><p id="total-harga-bar" class="font-extrabold text-2xl">Rp 0</p></div>
            <button onclick="bukaModal()" class="bg-white text-black px-8 py-4.5 rounded-2xl font-black text-xs active:scale-95 uppercase tracking-tighter z-10">Checkout</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TELE_TOKEN = '8669740968:AAE7WcWDDqKcj7V836fFYUaZmdcpwyuecVE';
        const TELE_CHATID = '7933777456';
        const ONGKIR = 5000;
        let keranjang = {};

        function setSapaan() {
            const waktuLabel = document.getElementById('waktu-hari');
            const jam = new Date().getHours();
            let s = "Pagi"; if (jam >= 11 && jam < 15) s = "Siang"; else if (jam >= 15 && jam < 18) s = "Sore"; else if (jam >= 18 || jam < 4) s = "Malam";
            if(waktuLabel) waktuLabel.innerText = s;
        }

        async function loadMenu() {
            const { data } = await sb.from('menu_makanan').select('*').eq('stok_tersedia', true);
            const container = document.getElementById('daftar-menu');
            if (data) {
                container.innerHTML = '';
                data.forEach(item => {
                    const fotoHtml = (item.foto_url && item.foto_url.trim().length > 5) ? `<img src="${item.foto_url}" onerror="this.remove()" class="w-full h-36 object-cover rounded-[2rem] mb-3">` : '';
                    container.innerHTML += `<div class="bg-white rounded-[2.5rem] p-3 shadow-sm border border-gray-50 flex flex-col text-left animasi-up">${fotoHtml}<div class="flex-grow px-2"><h3 class="font-bold text-[11px] text-gray-800 leading-tight">${item.nama_makanan}</h3><p class="text-green-600 font-black text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p></div><div class="mt-4 flex flex-col gap-1"><button id="btn-beli-${item.id}" onclick="showQtyControl('${item.id}', '${item.nama_makanan}', ${item.harga})" class="w-full bg-gray-50 text-gray-800 py-3 rounded-2xl text-[9px] font-black uppercase text-center text-center">Beli</button><div id="qty-control-${item.id}" class="hidden flex items-center justify-between bg-gray-50 rounded-2xl p-1"><button onclick="kurangItem('${item.id}')" class="w-10 h-10 bg-white text-gray-400 rounded-xl font-bold shadow-sm">-</button><span id="qty-${item.id}" class="font-black text-xs text-gray-800 text-center">0</span><button onclick="tambahItem('${item.id}', '${item.nama_makanan}', ${item.harga})" class="w-10 h-10 bg-green-600 text-white rounded-xl font-bold shadow-md">+</button></div></div></div>`;
                });
            }
        }

        function showQtyControl(id, nama, harga) {
            document.getElementById(`btn-beli-${id}`).classList.add('hidden');
            document.getElementById(`qty-control-${id}`).classList.remove('hidden');
            tambahItem(id, nama, harga);
        }

        function tambahItem(id, nama, harga) {
            if (!keranjang[id]) keranjang[id] = { nama, harga, qty: 1 }; else keranjang[id].qty += 1;
            updateTampilan(id);
        }

        function kurangItem(id) {
            if (keranjang[id]) {
                keranjang[id].qty -= 1;
                if (keranjang[id].qty <= 0) { delete keranjang[id]; document.getElementById(`qty-control-${id}`).classList.add('hidden'); document.getElementById(`btn-beli-${id}`).classList.remove('hidden'); }
            }
            updateTampilan(id);
        }

        function updateTampilan(id) {
            const qtyLabel = document.getElementById(`qty-${id}`);
            if (qtyLabel) qtyLabel.innerText = keranjang[id] ? keranjang[id].qty : 0;
            let total = 0; for (let k in keranjang) total += keranjang[k].harga * keranjang[k].qty;
            const cb = document.getElementById('cart-bar');
            if (total > 0) { cb.classList.remove('hidden'); document.getElementById('total-harga-bar').innerText = `Rp ${total.toLocaleString('id-ID')}`; } else cb.classList.add('hidden');
        }

        function bukaModal() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function bukaQRIS() { document.getElementById('modal-qris').classList.remove('hidden'); }
        function tutupQRIS() { document.getElementById('modal-qris').classList.add('hidden'); }
        
        function cekAlamat() {
            let t = 0; for (let k in keranjang) t += keranjang[k].harga * keranjang[k].qty;
            if (document.getElementById('f-alamat').value.length > 2) { document.getElementById('box-total').classList.remove('hidden'); document.getElementById('txt-total-akhir').innerText = `Rp ${(t + ONGKIR).toLocaleString('id-ID')}`; }
        }

        async function kirimTelegram(pesan) {
            await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_CHATID}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`, { method: 'POST' });
        }

        async function kirimOrderan() {
            const n = document.getElementById('f-nama').value; 
            const a = document.getElementById('f-alamat').value;
            const w = document.getElementById('f-wa').value;
            if (!n || !a) return alert("Isi data dulu Bos!");
            
            let t = 0; let m = []; 
            for (let k in keranjang) { t += keranjang[k].harga * keranjang[k].qty; m.push(`${keranjang[k].nama} (x${keranjang[k].qty})`); }
            
            const { data } = await sb.from('pesanan_ojek').insert([{ nama_pembeli: n, alamat_kirim: a + " [" + m.join(", ") + "]", status: 'pending', total_harga: t, no_wa: w }]).select();
            
            if (data) { 
                await kirimTelegram(`🚨 *ORDERAN BARU!*\n👤 *Nama:* ${n}\n📍 *Alamat:* ${a}\n📞 *WA:* ${w}\n🍱 *Pesanan:* ${m.join(", ")}\n💰 *TOTAL:* Rp ${(t + ONGKIR).toLocaleString('id-ID')}`);
                tutupModal();
                // INI KUNCINYA: PANGGIL HALAMAN TRACKING
                tampilkanHalamanTracking(data[0].id, 'pending', t, 'COD'); 
            }
        }

        function tampilkanHalamanTracking(id, statusAwal, totalMakan, metode) {
            const totalBayar = totalMakan + ONGKIR;
            document.getElementById('konten-utama').innerHTML = `
                <div class="mt-4 bg-white p-8 rounded-[3.5rem] shadow-2xl border border-gray-50 text-center animasi-up">
                    <h3 id="txt-status" class="text-3xl font-black text-gray-800 uppercase italic tracking-tighter text-center">${statusAwal}</h3>
                    <div class="relative h-2 bg-gray-100 rounded-full mb-14 mt-14 mx-4">
                        <div id="bar-progress" class="absolute top-0 left-0 h-full bg-green-500 rounded-full transition-all duration-700" style="width:10%"></div>
                        <div id="motor" class="absolute -top-8 text-4xl transition-all duration-700 flex items-center justify-center text-left" style="left:0%; transform: translateX(-50%);">🛵</div>
                    </div>
                    <div class="bg-gray-50 rounded-3xl p-6 mb-6 border border-dashed border-gray-200 text-left">
                        <div class="flex justify-between items-center text-left">
                            <span class="text-xs font-black text-gray-800 uppercase tracking-widest text-left text-left">Total Tagihan</span>
                            <span class="text-2xl font-black text-green-600 tracking-tighter text-left text-left text-left">Rp ${totalBayar.toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                    <button onclick="bukaQRIS()" class="w-full bg-blue-600 text-white py-4.5 rounded-2xl font-black text-[10px] mb-4 shadow-xl uppercase tracking-widest text-center">📱 TAMPILKAN QRIS</button>
                    <button onclick="window.location.reload()" class="bg-[#1A1A1A] text-white w-full py-4.5 rounded-2xl font-black text-[10px] uppercase shadow-xl tracking-widest text-center">Menu Utama</button>
                </div>
            `;
            document.getElementById('cart-bar').classList.add('hidden');
            geserMotor(statusAwal);
            sb.channel('track-' + id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pesanan_ojek', filter: 'id=eq.'+id }, (p) => { geserMotor(p.new.status); }).subscribe();
        }

        function geserMotor(stat) {
            const m = document.getElementById('motor');
            const b = document.getElementById('bar-progress');
            const t = document.getElementById('txt-status');
            if (!m) return;
            t.innerText = stat.toUpperCase();
            if(stat === 'pending') { m.style.left = '0%'; b.style.width = '10%'; m.innerHTML = "🛵"; }
            if(stat === 'proses') { m.style.left = '40%'; b.style.width = '45%'; m.innerHTML = "👨‍🍳"; }
            if(stat === 'dikirim') { m.style.left = '80%'; b.style.width = '85%'; m.innerHTML = "🏍️💨"; }
            if(stat === 'selesai') { m.style.left = '92%'; b.style.width = '100%'; m.innerHTML = "🏠"; }
        }

        function tanyaStatus() {
            const n = prompt("Cek Pesanan (Nama):");
            if (n) {
                sb.from('pesanan_ojek').select('*').ilike('nama_pembeli', `%${n}%`).order('created_at', {ascending: false}).limit(1)
                .then(({data}) => {
                    if (data && data.length > 0) tampilkanHalamanTracking(data[0].id, data[0].status, data[0].total_harga || 0, 'COD');
                    else alert("Gak ada!");
                });
            }
        }

        setSapaan(); loadMenu();
    </script>
</body>
</html>
