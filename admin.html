<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markas Driver - Grab Ndeso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F3F4F6] p-4 font-['Plus_Jakarta_Sans']">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8 mt-4">
            <h1 class="text-2xl font-black text-gray-800 tracking-tighter">ORDERAN <span class="text-green-600">MASUK</span> 🛵</h1>
            <div id="status-koneksi" class="text-[10px] bg-green-100 text-green-600 px-3 py-1 rounded-full font-bold animate-pulse">ONLINE</div>
        </div>
        
        <div id="list-orderan" class="space-y-6">
            <div class="bg-white p-10 rounded-[2.5rem] text-center shadow-sm border border-gray-100">
                <p class="text-gray-400 font-bold text-xs uppercase tracking-widest">Mencari Orderan...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function muatPesanan() {
            const { data, error } = await sb.from('pesanan_ojek').select('*').order('created_at', { ascending: false }).limit(20);
            const container = document.getElementById('list-orderan');
            
            if (data && data.length > 0) {
                container.innerHTML = '';
                data.forEach(o => {
                    const warnaStatus = o.status === 'selesai' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600';
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-white relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-xl text-gray-800 tracking-tight">${o.nama_pembeli}</h3>
                                    <p class="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">${new Date(o.created_at).toLocaleTimeString()}</p>
                                </div>
                                <span class="${warnaStatus} px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter shadow-sm">${o.status}</span>
                            </div>
                            
                            <div class="bg-gray-50 p-4 rounded-[1.5rem] mb-6 border border-gray-100">
                                <p class="text-[10px] text-gray-300 font-bold uppercase mb-1">📍 Alamat Kirim</p>
                                <p class="text-sm font-bold text-gray-700 leading-relaxed">${o.alamat_kirim}</p>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="updateStatus('${o.id}', 'proses')" class="bg-[#FBBF24] hover:bg-yellow-500 text-white py-4 rounded-2xl font-black text-[9px] uppercase shadow-lg shadow-yellow-100 transition-all active:scale-90">Masak</button>
                                <button onclick="updateStatus('${o.id}', 'dikirim')" class="bg-[#3B82F6] hover:bg-blue-600 text-white py-4 rounded-2xl font-black text-[9px] uppercase shadow-lg shadow-blue-100 transition-all active:scale-90">Kirim</button>
                                <button onclick="updateStatus('${o.id}', 'selesai')" class="bg-[#10B981] hover:bg-green-600 text-white py-4 rounded-2xl font-black text-[9px] uppercase shadow-lg shadow-green-100 transition-all active:scale-90">Sampai</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function updateStatus(id, stat) {
            const { error } = await sb.from('pesanan_ojek').update({ status: stat }).eq('id', id);
            if(!error) muatPesanan();
        }

        // FITUR SAKTI: Pantau perubahan secara REALTIME
        sb.channel('db-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'pesanan_ojek' }, (payload) => {
              console.log('Ada orderan baru/perubahan!');
              muatPesanan(); // Refresh otomatis tanpa klik
          })
          .subscribe();

        // Jalankan saat pertama buka
        muatPesanan();
    </script>
</body>
</html>
