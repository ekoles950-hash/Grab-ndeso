<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markas Driver - Grab Ndeso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F3F4F6] p-4 font-['Plus_Jakarta_Sans']">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8 mt-4">
            <h1 class="text-2xl font-black text-gray-800 tracking-tighter">ORDERAN <span class="text-green-600">MASUK</span> 🛵</h1>
            <div class="text-[10px] bg-green-100 text-green-600 px-3 py-1 rounded-full font-bold">ONLINE</div>
        </div>
        
        <div id="list-orderan" class="space-y-6">
            <p class="text-center text-gray-400 py-10 font-bold uppercase text-[10px] tracking-widest">Mencari Orderan...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function muatPesanan() {
            const { data } = await sb.from('pesanan_ojek').select('*').order('created_at', { ascending: false }).limit(15);
            const container = document.getElementById('list-orderan');
            
            if (data && data.length > 0) {
                container.innerHTML = '';
                data.forEach(o => {// Di bawah tulisan alamat, tambahkan:
<p class="text-[10px] font-black ${o.metode_bayar === 'QRIS' ? 'text-blue-600' : 'text-orange-600'} uppercase mt-2">
    💳 METODE: ${o.metode_bayar || 'COD'}
</p>
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-xl text-gray-800">${o.nama_pembeli}</h3>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase">${new Date(o.created_at).toLocaleTimeString()}</p>
                                </div>
                                <span class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">${o.status}</span>
                            </div>
                            
                            <div class="bg-gray-50 p-4 rounded-2xl mb-4">
                                <p class="text-sm font-bold text-gray-700 mb-3">📍 ${o.alamat_kirim}</p>
                                
                                <div class="flex items-center gap-2 bg-white p-3 rounded-xl border border-gray-100">
                                    <span class="text-xs">📞</span>
                                    <input type="text" readonly value="${o.no_wa || ''}" id="input-wa-${o.id}" class="bg-transparent text-xs font-black text-green-600 w-full outline-none">
                                    <button onclick="salinNomor('${o.id}')" class="bg-green-100 text-green-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Salin</button>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="updateStatus('${o.id}', 'proses')" class="bg-yellow-400 text-white py-4 rounded-xl text-[9px] font-black uppercase">Masak</button>
                                <button onclick="updateStatus('${o.id}', 'dikirim')" class="bg-blue-500 text-white py-4 rounded-xl text-[9px] font-black uppercase">Kirim</button>
                                <button onclick="updateStatus('${o.id}', 'selesai')" class="bg-green-600 text-white py-4 rounded-xl text-[9px] font-black uppercase">Sampai</button>
                            </div>
                        </div>`;
                });
            }
        }

        async function updateStatus(id, stat) {
            await sb.from('pesanan_ojek').update({ status: stat }).eq('id', id);
            muatPesanan();
        }

        function salinNomor(id) {
            const copyText = document.getElementById("input-wa-" + id);
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Disalin: " + copyText.value);
        }

        sb.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'pesanan_ojek' }, () => muatPesanan()).subscribe();
        muatPesanan();
    </script>
</body>
</html>
