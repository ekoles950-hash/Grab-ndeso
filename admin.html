<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Grab Ndeso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; }
        .card-order { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .btn-status { transition: 0.3s; text-transform: uppercase; font-weight: 800; font-size: 10px; letter-spacing: 1px; }
    </style>
</head>
<body class="p-5 pb-20">

    <audio id="suara-notif" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tighter uppercase">Orderan<span class="text-green-600">Masuk</span></h1>
                <p class="text-[9px] font-bold text-gray-400 tracking-widest uppercase">Dashboard Driver V2.0</p>
            </div>
            <div class="text-right">
                <span id="label-online" class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">• Online</span>
                <button onclick="location.reload()" class="block mt-2 text-[10px] font-black text-gray-400 uppercase">Refresh</button>
            </div>
        </div>

        <div id="container-orderan" class="space-y-6">
            <p class="text-center text-gray-400 py-10 font-bold text-xs uppercase tracking-widest">Menunggu Orderan Baru...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const sound = document.getElementById('suara-notif');

        // Fungsi Ambil Data
        async function loadOrderan() {
            const { data } = await sb.from('pesanan_ojek').select('*').order('created_at', { ascending: false });
            if (data) renderOrderan(data);
        }

        function renderOrderan(list) {
            const container = document.getElementById('container-orderan');
            container.innerHTML = '';
            list.forEach(order => {
                const statusColor = order.status === 'pending' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600';
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-50 card-order">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-xl text-gray-800">${order.nama_pembeli}</h3>
                                <p class="text-[10px] font-bold text-gray-400 italic">${new Date(order.created_at).toLocaleTimeString()}</p>
                            </div>
                            <span class="${statusColor} px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest">${order.status}</span>
                        </div>
                        
                        <div class="bg-gray-50 p-5 rounded-3xl mb-4 border border-gray-100">
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Lokasi Pengantaran</p>
                            <p class="font-bold text-gray-700 text-sm">📍 ${order.alamat_kirim}</p>
                            <div class="mt-4 pt-4 border-t border-gray-200">
                                <p class="text-[9px] font-bold text-blue-600 uppercase">💳 Metode: ${order.metode_bayar || 'COD'}</p>
                                <p class="font-black text-gray-800 mt-1">TOTAL: Rp ${order.total_harga.toLocaleString('id-ID')}</p>
                            </div>
                        </div>

                        <div class="flex gap-2 mb-6">
                             <div class="flex-1 bg-gray-50 p-3 rounded-2xl flex items-center justify-between border border-gray-100">
                                <span class="text-xs font-bold text-gray-600">📞 ${order.no_wa || '-'}</span>
                                <button onclick="salinWA('${order.no_wa}')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase">Salin</button>
                             </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="updateStatus('${order.id}', 'proses')" class="btn-status py-4 rounded-2xl bg-yellow-400 text-white shadow-lg shadow-yellow-100 active:scale-95">Masak</button>
                            <button onclick="updateStatus('${order.id}', 'dikirim')" class="btn-status py-4 rounded-2xl bg-blue-500 text-white shadow-lg shadow-blue-100 active:scale-95">Kirim</button>
                            <button onclick="updateStatus('${order.id}', 'selesai')" class="btn-status py-4 rounded-2xl bg-green-600 text-white shadow-lg shadow-green-100 active:scale-95">Sampai</button>
                        </div>
                    </div>
                `;
            });
        }

        async function updateStatus(id, stat) {
            await sb.from('pesanan_ojek').update({ status: stat }).eq('id', id);
            loadOrderan();
        }

        function salinWA(no) {
            navigator.clipboard.writeText(no);
            alert("Nomor WA disalin!");
        }

        // --- SISTEM NOTIFIKASI BUNYI REALTIME ---
        sb.channel('custom-all-channel')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pesanan_ojek' }, (payload) => {
              console.log('Ada orderan baru!', payload);
              sound.play().catch(e => console.log("Klik layar dulu biar suara aktif!"));
              loadOrderan();
          })
          .subscribe();

        // Penting: Browser biasanya melarang suara otomatis.
        // User (Bos) harus klik apa saja di layar sekali setelah buka admin biar suaranya "diizinkan".
        document.body.addEventListener('click', () => {
            console.log("Audio diaktifkan oleh User");
        }, { once: true });

        loadOrderan();
    </script>
</body>
</html>
