<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Driver - Grab Ndeso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-green-700">ORDERAN MASUK 🛵</h1>
            <button onclick="location.reload()" class="bg-white p-2 rounded-lg shadow text-xs font-bold">Refresh</button>
        </div>
        
        <div id="list-orderan" class="space-y-4">
            <p class="text-center text-gray-400 py-10">Mencari sinyal orderan...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X'; // PAKAI KEY KAMU BOS
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function muatPesanan() {
            const { data } = await sb.from('pesanan_ojek').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('list-orderan');
            
            if (data && data.length > 0) {
                container.innerHTML = '';
                data.forEach(o => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-200">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-black text-gray-800">${o.nama_pembeli}</h3>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase">${new Date(o.created_at).toLocaleTimeString()}</p>
                                </div>
                                <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">${o.status}</span>
                            </div>
                            <p class="text-sm text-gray-600 bg-gray-50 p-3 rounded-xl mb-4 italic">📍 ${o.alamat_kirim}</p>
                            
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="updateStatus('${o.id}', 'proses')" class="bg-yellow-500 text-white py-2 rounded-xl text-[10px] font-bold">MASAK</button>
                                <button onclick="updateStatus('${o.id}', 'dikirim')" class="bg-blue-500 text-white py-2 rounded-xl text-[10px] font-bold">KIRIM</button>
                                <button onclick="updateStatus('${o.id}', 'selesai')" class="bg-green-600 text-white py-2 rounded-xl text-[10px] font-bold">SAMPAI</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function updateStatus(id, stat) {
            await sb.from('pesanan_ojek').update({ status: stat }).eq('id', id);
            muatPesanan();
        }

        setInterval(muatPesanan, 5000);
        muatPesanan();
    </script>
</body>
</html>
