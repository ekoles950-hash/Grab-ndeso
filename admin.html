<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markas Driver - Grab Ndeso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tombol-aksi { transition: all 0.2s; }
        .tombol-aksi:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-[#F3F4F6] p-4">
    <div class="max-w-md mx-auto">
        
        <div class="flex justify-between items-center mb-8 mt-4">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tighter uppercase italic">Orderan <span class="text-green-600">Masuk</span></h1>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Dashboard Driver v2.0</p>
            </div>
            <div class="flex flex-col items-end">
                <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[9px] font-black animate-pulse">● ONLINE</span>
                <button onclick="location.reload()" class="mt-2 text-[9px] font-bold text-gray-400 border-b border-gray-300">REFRESH</button>
            </div>
        </div>
        
        <div id="list-orderan" class="space-y-6">
            <div class="bg-white p-10 rounded-[2.5rem] text-center shadow-sm">
                <p class="text-gray-300 font-black text-[10px] uppercase tracking-widest">Menunggu Pesanan Baru...</p>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI SUPABASE
        const SUPABASE_URL = 'https://butydxuauhtvwojvpixt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yO2CBmW5iJ8UKXw802hvXA_nAz3gr9X'; 
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNGSI MUAT DATA DARI DATABASE
        async function muatPesanan() {
            const { data, error } = await sb.from('pesanan_ojek').select('*').order('created_at', { ascending: false }).limit(20);
            const container = document.getElementById('list-orderan');
            
            if (data && data.length > 0) {
                container.innerHTML = '';
                data.forEach(o => {
                    // Logika Warna Status
                    let warnaStatus = "bg-orange-100 text-orange-600";
                    if(o.status === 'selesai') warnaStatus = "bg-green-100 text-green-600";
                    if(o.status === 'dikirim') warnaStatus = "bg-blue-100 text-blue-600";

                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-white relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-xl text-gray-800 tracking-tight">${o.nama_pembeli}</h3>
                                    <p class="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">${new Date(o.created_at).toLocaleTimeString()}</p>
                                </div>
                                <span class="${warnaStatus} px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-tighter shadow-sm">${o.status}</span>
                            </div>
                            
                            <div class="bg-gray-50 p-5 rounded-[2rem] mb-6 border border-gray-100">
                                <p class="text-[9px] text-gray-400 font-black uppercase mb-2 tracking-widest">Lokasi Pengantaran</p>
                                <p class="text-sm font-bold text-gray-700 leading-relaxed mb-4">📍 ${o.alamat_kirim}</p>
                                
                                <div class="mb-4 pt-3 border-t border-gray-200">
                                    <p class="text-[10px] font-black ${o.metode_bayar === 'QRIS' ? 'text-blue-600' : 'text-orange-600'} uppercase">
                                        💳 METODE: ${o.metode_bayar || 'COD'}
                                    </p>
                                    <p class="text-[11px] font-black text-gray-800 mt-1">TOTAL TAGIHAN: Rp ${(o.total_harga + 5000).toLocaleString('id-ID')}</p>
                                </div>

                                <div class="flex items-center gap-2 bg-white p-3 rounded-2xl border border-gray-100">
                                    <span class="text-xs">📞</span>
                                    <input type="text" readonly value="${o.no_wa || ''}" id="input-wa-${o.id}" class="bg-transparent text-[11px] font-black text-green-600 w-full outline-none">
                                    <button onclick="salinNomor('${o.id}')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-md shadow-green-100 tombol-aksi">Salin</button>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="updateStatus('${o.id}', 'proses')" class="bg-yellow-400 hover:bg-yellow-500 text-white py-4 rounded-2xl font-black text-[9px] uppercase shadow-lg shadow-yellow-100 tombol-aksi">Masak</button>
                                <button onclick="updateStatus('${o.id}', 'dikirim')" class="bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-2xl font-black text-[9px] uppercase shadow-lg shadow-blue-100 tombol-aksi">Kirim</button>
                                <button onclick="updateStatus('${o.id}', 'selesai')" class="bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black text-[9px] uppercase shadow-lg shadow-green-100 tombol-aksi">Sampai</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // FUNGSI UPDATE STATUS KE DATABASE
        async function updateStatus(id, stat) {
            const { error } = await sb.from('pesanan_ojek').update({ status: stat }).eq('id', id);
            if(!error) {
                console.log("Status diupdate!");
                muatPesanan();
            }
        }

        // FUNGSI SALIN NOMOR WA
        function salinNomor(id) {
            const copyText = document.getElementById("input-wa-" + id);
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value);
            
            // Notifikasi Kecil
            const btn = event.target;
            const textLama = btn.innerText;
            btn.innerText = "OK!";
            setTimeout(() => { btn.innerText = textLama; }, 1000);
        }

        // FITUR REALTIME (Otomatis Refresh saat ada Orderan Baru)
        sb.channel('markas-driver')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'pesanan_ojek' }, (payload) => {
              muatPesanan();
          })
          .subscribe();

        // Jalankan saat pertama buka halaman
        muatPesanan();
    </script>
</body>
</html>
